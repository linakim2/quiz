<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국어 실력테스트 3회 — 인터랙티브</title>
<style>
:root{
  --ink:#2B1A0A; --gold:#A8762B; --paper:#FBF8F3; --card:#FFFFFF;
  --line:#E5DDD0; --red:#C0392B; --blue:#2E5496; --green:#1E7A46;
  --gray:#6B6157; --shadow:0 1px 3px rgba(43,26,10,.08),0 4px 16px rgba(43,26,10,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--paper); color:var(--ink); line-height:1.7; -webkit-text-size-adjust:100%;}
.wrap{max-width:780px;margin:0 auto;padding:0 16px 120px}

/* 헤더 */
header{background:linear-gradient(135deg,#2B1A0A 0%,#3d2812 100%);
  color:#fff;padding:22px 16px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hwrap{max-width:780px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px}
.htitle{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hsub{font-size:11px;opacity:.75;margin-top:2px;font-weight:400}
.hscore{text-align:right;font-size:12px;opacity:.9;white-space:nowrap}
.hscore b{font-size:20px;color:var(--gold)}
/* 진행바 */
.progress{height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:12px;overflow:hidden}
.progress .bar{height:100%;background:var(--gold);width:0%;transition:width .4s}

/* 인트로 */
.intro{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 22px;margin:24px 0;box-shadow:var(--shadow);text-align:center}
.intro h1{font-size:22px;margin-bottom:6px}
.intro .badge{display:inline-block;background:var(--ink);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:14px;letter-spacing:1px}
.intro p{color:var(--gray);font-size:14px;margin:6px 0}
.intro .infogrid{display:flex;gap:10px;justify-content:center;margin:18px 0;flex-wrap:wrap}
.intro .infogrid div{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 16px;font-size:13px}
.intro .infogrid b{display:block;font-size:18px;color:var(--gold)}
.btn{display:inline-block;background:var(--ink);color:#fff;border:none;font-family:inherit;
  font-size:15px;font-weight:700;padding:14px 32px;border-radius:12px;cursor:pointer;transition:.2s;margin-top:8px}
.btn:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
.btn.gold{background:var(--gold)}

/* 지문 카드 */
.passage{background:#FEFCF8;border:1px solid var(--line);border-left:4px solid var(--gold);
  border-radius:12px;padding:18px;margin:18px 0;box-shadow:var(--shadow)}
.passage .plabel{font-size:12px;font-weight:800;color:var(--gold);letter-spacing:.5px;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.passage .ptext{white-space:pre-wrap;font-size:14.5px;line-height:1.9;color:#3a2c1c}
.passage.collapsed .ptext{display:none}
.passage .toggle{font-size:11px;color:var(--gray);font-weight:600}
.bogi{background:#F4F0E8;border:1px dashed #b9a988;border-radius:10px;padding:12px 14px;margin:12px 0;
  font-size:13.5px;white-space:pre-wrap;line-height:1.8}
.bogi .blabel{text-align:center;font-weight:800;font-size:12px;letter-spacing:3px;margin-bottom:6px;color:var(--ink)}

/* 문항 카드 */
.q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 18px;margin:16px 0;box-shadow:var(--shadow)}
.qhead{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.qnum{font-size:16px;font-weight:800;color:var(--ink);white-space:nowrap}
.qscore{font-size:11px;color:var(--red);font-weight:700;background:#fcf0ee;padding:1px 7px;border-radius:10px;white-space:nowrap}
.qtag{font-size:10px;color:var(--gray);background:var(--paper);padding:1px 7px;border-radius:10px;margin-left:auto}
.qstem{font-size:15px;font-weight:600;margin:6px 0 14px;line-height:1.6}
.choices{list-style:none;display:flex;flex-direction:column;gap:8px}
.choice{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border:1.5px solid var(--line);
  border-radius:10px;cursor:pointer;transition:.15s;font-size:14px;background:#fff}
.choice:hover{border-color:var(--gold);background:#fffdf8}
.choice .ci{font-weight:800;color:var(--gray);flex-shrink:0}
.choice.sel{border-color:var(--ink);background:#f8f3ec}
.choice.correct{border-color:var(--green);background:#eefcf3}
.choice.correct .ci{color:var(--green)}
.choice.wrong{border-color:var(--red);background:#fdf0ee}
.choice.wrong .ci{color:var(--red)}
.choice.disabled{cursor:default;pointer-events:none}

/* 서답형 */
.subarea textarea{width:100%;min-height:90px;border:1.5px solid var(--line);border-radius:10px;
  padding:12px;font-family:inherit;font-size:14px;line-height:1.7;resize:vertical;background:#fff}
.subarea textarea:focus{outline:none;border-color:var(--gold)}
.condbox{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin:10px 0;font-size:13px}
.condbox b{display:block;margin-bottom:4px;font-size:12px;color:var(--ink)}
.condbox ol{margin-left:18px}

/* 해설 */
.explain{margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;font-size:13.5px;line-height:1.75;display:none}
.explain.show{display:block;animation:fade .3s}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.explain .res{font-weight:800;font-size:14px;margin-bottom:8px}
.explain .res.o{color:var(--green)}
.explain .res.x{color:var(--red)}
.explain .ans{color:var(--red);font-weight:700}
.explain .lbl{font-weight:800;color:var(--ink)}
.explain .wrong-lbl{font-weight:800;color:var(--blue)}
.explain .modelans{background:#f3f7fb;border-left:3px solid var(--blue);padding:10px 12px;border-radius:8px;margin:8px 0}
.explain .crit{background:var(--paper);border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12.5px;color:var(--gray)}
.gradebtns{display:flex;gap:8px;margin-top:10px}
.gradebtns button{flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--line);background:#fff;
  font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:.15s}
.gradebtns button.og:hover{border-color:var(--green);color:var(--green)}
.gradebtns button.xg:hover{border-color:var(--red);color:var(--red)}
.gradebtns button.sel-o{background:#eefcf3;border-color:var(--green);color:var(--green)}
.gradebtns button.sel-x{background:#fdf0ee;border-color:var(--red);color:var(--red)}

/* 제출 바 */
.submitbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);padding:12px 16px;z-index:40;box-shadow:0 -2px 12px rgba(43,26,10,.06)}
.submitbar .sw{max-width:780px;margin:0 auto;display:flex;align-items:center;gap:12px;justify-content:space-between}
.submitbar .status{font-size:13px;color:var(--gray)}
.submitbar .status b{color:var(--ink)}

/* 결과 모달 */
.result{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 22px;margin:20px 0;box-shadow:var(--shadow);text-align:center;display:none}
.result.show{display:block}
.result h2{font-size:20px;margin-bottom:4px}
.result .big{font-size:46px;font-weight:800;color:var(--gold);margin:10px 0}
.result .sub{color:var(--gray);font-size:14px}
.result .bd{display:flex;gap:10px;justify-content:center;margin:16px 0;flex-wrap:wrap}
.result .bd div{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:10px 18px}
.result .bd b{display:block;font-size:20px}
.sectiontitle{font-size:13px;font-weight:800;color:var(--gold);letter-spacing:.5px;margin:26px 0 8px;
  padding-bottom:6px;border-bottom:2px solid var(--line)}
.hidden{display:none!important}
u.ul{text-decoration:none;border-bottom:2px solid var(--ink);padding-bottom:1px;font-weight:600}
.note{font-size:12px;color:var(--gray);text-align:center;margin-top:20px;line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <div>
      <div class="htitle" id="hTitle">국어 실력테스트 3회</div>
      <div class="hsub">중앙고 120기 · 갈무리국어 · BLACK CAPTAIN</div>
    </div>
    <div class="hscore"><span id="hScoreLabel">진행</span><br><b id="hScore">0</b></div>
  </div>
  <div class="progress"><div class="bar" id="hBar"></div></div>
</header>

<div class="wrap">
  <!-- 인트로 -->
  <div class="intro" id="intro">
    <div class="badge">INTERACTIVE</div>
    <h1 id="introTitle">국어 실력테스트 3회</h1>
    <p id="introMeta"></p>
    <div class="infogrid">
      <div><b id="iObj">30</b>선택형</div>
      <div><b id="iSub">5</b>서답형</div>
      <div><b>100</b>총점</div>
    </div>
    <p style="font-size:13px">지문과 &lt;보기&gt;를 보며 문제를 풀고, 제출하면 즉시 채점·해설을 확인할 수 있습니다.<br>서답형은 직접 작성한 뒤 모범답안과 대조해 자기 채점합니다.</p>
    <button class="btn" onclick="startExam()">시험 시작하기</button>
  </div>

  <!-- 문제 영역 -->
  <div id="examArea" class="hidden"></div>

  <!-- 결과 -->
  <div class="result" id="result">
    <h2>채점 결과</h2>
    <div class="big" id="rScore">0점</div>
    <div class="sub" id="rSub"></div>
    <div class="bd">
      <div>선택형<b id="rObj">0</b></div>
      <div>서답형<b id="rSub2">0</b></div>
      <div>정답률<b id="rRate">0%</b></div>
    </div>
    <button class="btn ghost" onclick="reviewAll()">전체 해설 보기</button>
    <button class="btn" onclick="restartExam()">다시 풀기</button>
  </div>

  <div class="note" id="footNote"></div>
</div>

<!-- 제출 바 -->
<div class="submitbar hidden" id="submitbar">
  <div class="sw">
    <div class="status">선택형 <b id="sDone">0</b>/<b id="sTotal">30</b> 응답</div>
    <button class="btn gold" onclick="submitExam()" id="submitBtn">제출하고 채점</button>
  </div>
</div>

<script>
const DATA = {"sets": {"SET1": {"label": "[1~7] 땅끝 · 낙화 · 1942년 가을 열차", "passage": "(가) 땅끝 / 나희덕\n산 너머 고운 노을을 보려고\n그네를 힘차게 차고 올라 발을 굴렀지.\n노을은 끝내 어둠에게 잡아먹혔지.\n나를 태우고 날아가던 그넷줄이\n오랫동안 삐걱삐걱 떨고 있었어.\n\n어릴 때는 나비를 좇듯\n아름다움에 취해 ㉠⟦땅끝⟧을 찾아갔지.\n그건 아마도 끝이 아니었을지도 몰라.\n그러나 살면서 몇 번은 ㉡⟦땅끝⟧에 서게도 되지.\n파도가 끊임없이 땅을 먹어 들어오는 막바지에서\n이렇게 뒷걸음질치면서 말야.\n\n살기 위해서는 이제\n뒷걸음질만이 허락된 것이라고.\n파도가 아가리를 쳐들고 달려드는 곳\n찾아 나선 것도 아니었지만.\n끝내 발 디디며 서 있는 땅의 끝,\n\n그런데 이상하기도 하지.\n위태로움 속에 아름다움이 스며 있다는 것이\n㉢⟦땅끝⟧은 늘 젖어 있다는 것이\n그걸 보려고\n또 몇 번은 여기에 이르리라는 것이.\n\n\n(나) 낙화 / 이형기\n가야 할 때가 언제인가를\n분명히 알고 가는 이의\n뒷모습은 얼마나 아름다운가.\n\n봄 한철\n격정을 인내한\n나의 사랑은 지고 있다.\n\n㉣⟦분분한 낙화……⟧\n결별이 이룩하는 축복에 싸여\n지금은 가야 할 때,\n\n무성한 녹음과 그리고\n머지않아 열매 맺는\n가을을 향하여\n나의 청춘은 꽃답게 죽는다.\n\n헤어지자\n섬세한 손길을 흔들며\n아롱아롱 꽃잎이 지는 어느 날\n\n나의 사랑, 나의 결별,\n샘터에 물 고이듯 성숙하는\n내 영혼의 슬픈 눈.\n\n\n(다) 1942년 가을 열차 / 문태준\n광양에서 하동 지나 삼랑진 지나 물금 지나 부전 가네 세 량의 객차를 달고 가네 북천 사람은 함안 사람을 부르네 함안 사람은 마산 사람을 부르네 ㉤⟦나발과 꽹과리를 불고 치듯⟧ 시끌시끌하게 덜커덩거리며 가네 젖먹이 아이와 젊은 연인과 축하객이 함께 가네 침침하고 눈매가 가느스름한 김천 출신의 나도 끼여 가네 시냇물에 고무신 미끄러지며 떠내려가듯 가네 소나기구름 실어 나르는 바람의 널빤지 가듯 가네 연한 버들과 높은 미루나무와 먼 무지개를 싣고 가네 들판 수로의 깨끗한 물과 무논에 비추어 보며 가네 무논에 비친 푸른 봄산은 일하는 소가 등에 태우고 가네 신록(新綠)이 가네 보자기를 풀어놓을 시간만큼 조금 조금씩 역마다 연착하면서", "bogi": "(가)~(다)는 모두 부정적이거나 상실의 상황을 단순한 슬픔으로 끝맺지 않는다. (가)는 절망의 끝에서 오히려 희망을 발견하고, (나)는 소멸과 이별을 더 높은 성숙으로 끌어올리며, (다)는 더디고 흔들리는 여정 자체를 정겨움으로 끌어안는다. 이처럼 대립하는 두 국면(상실과 생성, 흔들림과 정겨움)을 한자리에서 끌어안아 더 높은 인식으로 나아가는 태도는, 부정의 상황을 회피하지 않고 끌어안아 넘어서려는 '초극(超克)'의 자세로 볼 수 있다."}, "SET2": {"label": "[8~12] 와사등 · 대장간의 유혹", "passage": "(가) 와사등 / 김광균\n차단―한 등불이 하나 비인 하늘에 걸려 있다.\n내 호올로 어딜 가라는 슬픈 신호냐.\n\n긴―여름 해 황망히 나래를 접고\n늘어선 고층(高層) 창백한 ㉠⟦묘석(墓石)같이⟧ 황혼에 젖어\n찬란한 야경 무성한 ㉡⟦잡초인 양⟧ 헝클어진 채\n사념(思念) 벙어리 되어 입을 다물다.\n\n피부의 바깥에 스미는 어둠\n낯설은 거리의 아우성 소리\n까닭도 없이 눈물겹고나\n\n공허한 군중의 행렬에 섞이어\n내 어디서 그리 무거운 비애를 지니고 왔기에\n길―게 늘인 그림자 이다지 어두워\n내 어디로 어떻게 가라는 슬픈 신호기\n\n차단―한 등불이 하나 비인 하늘에 걸려 있다.\n내 호올로 어딜 가라는 슬픈 신호냐.\n\n\n(나) 대장간의 유혹 / 김광규\n제 손으로 만들지 않고\n한꺼번에 싸게 사서\n마구 쓰다가\n망가지면 내다 버리는\n㉢⟦플라스틱 물건⟧처럼 느껴질 때\n나는 당장 버스에서 뛰어내리고 싶다\n현대 아파트가 들어서며\n홍은동 사거리에서 사라진\n털보네 대장간을 찾아가고 싶다\n풀무질로 이글거리는 불 속에\n㉣⟦시우쇠처럼 나를 달구고⟧\n모루 위에서 벼리고\n숫돌에 갈아\n시퍼런 ㉤⟦무쇠 낫⟧으로 바꾸고 싶다\n땀 흘리며 두들겨 하나씩 만들어 낸\n꼬부랑 호미가 되어\n소나무 자루에서 송진을 흘리면서\n대장간 벽에 걸리고 싶다\n지금까지 살아온 인생이\n온통 부끄러워지고\n직지사(直指寺) 해우소(解憂所)\n아득한 나락으로 떨어져 내리는\n똥덩이처럼 느껴질 때\n나는 가던 길을 멈추고 문득\n어딘가 걸려 있고 싶다", "bogi": "김광균의 (가)와 김광규의 (나)는 모두 현대 문명에 대한 화자의 인식을 드러낸다. (가)의 화자는 도시의 밤거리에서 방향을 잃은 채 군중 속의 고독과 근원적 비애를 느끼며, 도시를 죽음과 무질서의 이미지로 그려 낸다. 한편 (나)의 화자는 대량 생산·소비되는 문명 속에서 소모품처럼 살아가는 자신을 반성하고, 수고로운 노동으로 가치를 빚어내는 삶을 동경한다. 두 시는 각각 '관조와 비애', '반성과 지향'이라는 서로 다른 태도로 현대 문명을 응시한다."}, "SET3": {"label": "[13~17] 만무방", "passage": "《만무방》 / 김유정\n\n[앞부분 줄거리] 농번기에도 송이나 따고 남의 닭을 훔쳐 먹으며 떠도는 응칠은 한때 성실한 농민이었으나, 빚으로 살림이 거덜 난 뒤 빚 문서를 찢어 버리고 도박과 절도로 살아간다. 그런 그가 마을에서는 도리어 부러움을 산다. 어느 날 응칠은 성실한 동생 응오네 논의 벼가 자꾸 없어진다는 말을 듣는다.\n\n때는 한창 바쁠 추수 때이다. 농군치고 송이파적 나올 놈은 생겨나도 않았으리라. 하나 그는 꼭 해야만 할 일이 없었다. 어슬렁어슬렁 이 산 저 산 헤매며 솔잎 사이로 송이를 찾는다. 그는 늘 이렇게 입버릇처럼 중얼거렸다. \"이 땅 삼천리 강산에 늘여 놓인 곡식이 말짱 뉘 것이람. 먼저 먹는 놈이 임자 아니냐. 걸리지 않도록 먹을 궁리나 할 게지.\"\n\n그도 한 세 번이나 감옥에 걸려서 구메밥으로 사관을 틀었다. 마는 결국 제 밥상 위에 올라앉은 제 몫도 자칫하면 먹다 걸리긴 매일반이었다. 그만치 세상은 그에게 야박하였다. 그러나 응칠에게는 누구 하나 탓할 사람도, 매달릴 곳도 없었다.\n\n동생 응오는 형과는 딴판이었다. 응오는 진실한 농군이었다. 나이 서른하나에 무던히도 부지런한, 동리에서 소문난 모범 청년이었다. 그런 그가 올해에는 웬일인지 벼를 베지 않았다. 지주가 몇 번이나 베라고 독촉을 하였으되 응오는 들은 척도 하지 않았다.\n\n왜냐하면, 캄캄하도록 털고 나서 지주에게 도지를 제하고, 장리쌀을 제하고, 색조를 제하고 보니 남은 것은 등줄기를 흐르는 식은땀이 있을 따름이었다. 그것은 슬프다 하기보다 끝없이 부끄러웠다. 같이 털어 주던 동무들이 뻔히 보고 섰는데 빈 지게로 덜렁거리며 집으로 돌아오는 건 진정 열없기 짝이 없는 노릇이었다. 참다 참다 못해 응오는 눈에 눈물이 흘렀던 것이다. 그리하여 응오는 \"에라, 빌어먹을 거 너들끼리 캐다 먹든 말든 멋대로 하여라.\" 하고 내던져 두지 않을 수 없었다. 벼를 거뒀다고 말만 나면 빚쟁이들은 우― 몰려들 것이기 때문이었다.\n\n그런데 베지도 않은 그 논의 벼가 자꾸만 축이 났다. 누군가 밤마다 벼를 훔쳐 가는 것이었다. 전과가 있는 응칠은 자신이 도둑으로 몰릴 것이 두려웠다. 그리하여 진짜 도둑을 잡으려고 밤마다 동생의 논 근처 산기슭에 잠복하였다.\n\n이슥한 밤, 마침내 복면을 한 도둑이 나타나 응오네 논의 벼를 척척 베어 단으로 묶었다. 응칠은 와락 달려들며 \"이 자식, 남의 벼를 훔쳐 가니!\" 하고 대포처럼 고함을 질렀다. 도둑은 논둑으로 고대로 데굴데굴 굴러서 떨어졌다. 복면을 벗기고 보니 — 다름 아닌 동생 응오였다.\n\n\"성님까지 이렇게 못살게 굴기유?\" 응오는 제법 눈을 부라리며 몸을 홱 돌린다. 그리고 느끼며 울음이 복받친다. 봇짐도 내버린 채, \"내 것 내가 먹는데 누가 뭐래?\"\n\n응칠은 묵묵히 봇짐을 들어 보았다. 가뿐하니 끽 말가웃이나 될는지. 이까짓 걸 요렇게까지 해 가려는 그 심정은 실로 알 수 없었다. 내 걸 내가 훔쳐야 할 그 운명도 얄궂거니와, 형을 배반하고 이 짓을 벌인 아우도 아우렷다. 에―이 고얀 놈, 할 제 볼을 적시는 것은 눈물이다.\n\n응칠은 한참을 멍하니 섰더니 문득 좋은 수가 떠올랐다. \"얘, 좋은 수 있다. 네 원대로 돈을 해 줄게 나하구 잠깐 다녀오자.\" 어디 큰 황소라도 한 마리 몰아 오자는 것이었다. 그러나 응오는 형의 말을 들으려고도 하지 않았다. 마냥 고개를 숙인 채 우는 것이다.\n\n\"이눔아!\" 하고 응칠은 악에 받치어 \"명색이 성이라며?\" 하고는 대뜸 몽둥이로 그 볼기짝을 후려갈겼다. 응오가 체면을 불고하고 땅에 엎드려 엉엉 울도록 매는 내리었다. 그러고도 분이 안 풀려, 그는 멀거니 아우를 노려보았다. \"언제나 철이 날는지 딱한 일이었다.\" 응칠은 끝내 매에 지쳐 쓰러진 아우를 등에 들쳐 업었다. 그리고 터덜터덜 고개를 내려오는 것이었다.", "bogi": "「만무방」의 제목은 '염치없이 막되어 먹은 사람'을 뜻한다. 그러나 작가는 이 말을 도덕적으로 타락한 개인을 비난하기 위해 쓰지 않는다. 성실한 소작농 응오가 자기 논의 벼를 스스로 훔쳐야 하는 상황에서 보듯, 당대의 농민은 아무리 정직하게 일해도 도지·장리·색조와 빚에 짓눌려 살아갈 수 없었다. 곧 '만무방'은 개인의 윤리 문제가 아니라, 정직한 농민조차 범법자로 내모는 모순된 사회 구조가 빚어낸 인간형이다. 작가는 이를 상황적 반어와 해학을 통해 냉소적으로 고발한다."}, "SET4": {"label": "[18~24] 미스터 방 · 원고지", "passage": "title (가)  미스터 방 / 채만식\npara [앞부분 줄거리] 짚신 장수의 아들로 태어나 삼십이 되도록 남의 집 머슴살이를 하던 방삼복은, 막벌이로 떠돌다 신기료장수가 되어 거리를 떠도는 '코삐뚤이 삼복'이었다. 광복이 되자 그는 일본·중국에서 주워들은 토막 영어로 미군 S소위의 통역이 되어 하루아침에 '미스터 방'으로 출세한다. 좋은 집에 식모와 침모까지 두고 위세를 부리게 된 것이다. 한편 친일로 재산을 모았다가 광복 후 군중에게 모든 것을 빼앗긴 백주사는, 우연히 방삼복을 만나 그에게 빌붙어 잃은 재산을 되찾고 분풀이를 해 줄 것을 청하려 한다.\npara 백주사는 분하고 절치통한하여 회수도 하고 싶고 분풀이도 하고 싶고 했으나, 분풀이를 하재도 주먹을 부르쥐고 게걸거리는 수밖에는 별 도리가 없었다. 그러던 차에 마침 이 거리에서 옛날에 제 동네에 살던 코삐뚤이 삼복이를, 그것도 신수가 훤하여 '미스터 방'이 다 된 그를 만난 것이었다.\npara 방삼복은 백주사를 제 집으로 데리고 가서 술상을 차려 대접하였다. 술이 거나하게 오르자 방삼복은 어깨를 으쓱거리며 흰소리를 늘어놓기 시작하였다.\npara \"내 말 한마디면, 죄선 천지에 안 되는 일이 없습넨다. 흥, 이래 봬두 응…… 동양 척식 회사 사장두 내 말 한마디면 꿈쩍 못 하넌 사람입넨다. 어디 그뿐인 줄 아슈? 이승만 박사두 내가 말 한마디만 하면…….\" 미스터 방은 마룻전에 나앉아 마당에 놓인 술상을 발로 탁 차 엎지르며 그 잘난 위세를 부렸다.\npara 백주사는 그 꼴이 우습기도 하고 어이가 없기도 하였으나, 당장 아쉬운 처지인지라 마음에 흐뭇한 체 \"잘 부탁하네, 미스터 방.\" 하면서 비위를 맞추었다. 그러면서도 속으로는 \"고이연 놈. 일본 정치가 가고 미국 정치가 왔다고, 이번에는 코삐뚤이 삼복이 놈이 세도를 하는구나. 세상도 망조가 들었지.\" 하며 부드득 침을 삼켰다.\npara 이윽고 거나해진 미스터 방은 양치를 한다고 입에 물을 한입 가득 물고는, 노대(露臺)로 나가 손잡이에 기대어 서서, 물고 있던 양칫물을 그대로 아래로 좍 뱉었다. 그런데 그 순간, 마침 아래를 지나 그를 찾아 대문 안으로 들어서던 S소위의 얼굴에 그 양칫물이 정통으로 쏟아져 내렸다.\npara \"유 데빌!\" S소위는 성난 황소처럼 두 눈을 부릅뜨고 뛰어 올라와 미스터 방의 멱살을 잡아 끌어 내리더니, \"상놈의 자식!\" 하고는 주먹으로 그의 턱을 어퍼컷으로 올려붙였다. 미스터 방은 \"아이쿠.\" 한마디와 함께 그 잘난 위세째 그 자리에 나가동그라졌다.\n\n\ntitle (나)  원고지 / 이근삼\nstage [무대] 집 안. 책상 위에는 원고지가 잔뜩 쌓여 있고, 소파의 커버와 벽도 모두 원고지 무늬이다. 중년의 교수가 원고지 무늬의 양복을 입고 있는데, 허리에는 쇠사슬이 칭칭 감겨 있다. 막이 오르면 장남과 장녀가 관객을 향해 걸어 나온다.\ndlg 장남 / (관객을 향해) 우리 아버지랍니다. 저렇게 매일 번역만 하시지요. 일 년 열두 달, 하루도 빠짐없이 말입니다. 부모란 자식들에게 맡은 바 책임을 다하면 그만입니다. 우리 집이 이만큼 행복한 것도, 다 부모의 열렬한 책임감 덕분이지요.\ndlg 장녀 / (역시 관객을 향해) 저의 아버지는 참 훌륭한 분이세요. 가족을 위해 저렇게 헌신적으로 일하시니까요. 물론 우리는 아버지께 충분한 휴식을 권해 드린답니다. \"아버지, 건강을 염려하세요.\" 하고 말이에요.\nstage (교수, 비명 같은 하품을 하며 무거운 걸음으로 들어온다. 처가 달려 나와 교수의 양복 주머니를 샅샅이 뒤져 돈을 꺼낸다.)\ndlg 처 / (돈을 세며) 어디 보자…… 삼백 환! 육백 환! 여보, 어서 번역을 계속하세요. 이 원고가 바로 돈이라구요. 한 장에 얼마씩 하는지 아세요? 게으름 피울 새가 어디 있어요.\ndlg 교수 / (힘없이) 알아요, 알아. 그렇지만 나도 좀 쉬고 싶소. 옛날엔 나도 꿈이 있었지…… 푸른 하늘 같은 꿈이.\nstage (이때 까만 옷에 흉측한 얼굴을 한 감독관이 긴 회초리를 들고 불쑥 나타난다. 마치 지옥의 옥리(獄吏) 같다.)\ndlg 감독관 / (회초리를 휘두르며) 원고! 원고!\ndlg 교수 / (지친 목소리로 책상에 매달리며) 네, 네. 마지막 글자가…… 마지막 줄이…… 아직 멀었습니다. 조금만, 조금만 더……\nstage (교수가 문득 책상 위에서 한 장의 원고지를 발견하고는 멍하니 바라본다. 백구십 자짜리 원고지다. 스포트라이트가 그를 비추고, 잔잔한 음악과 함께 흰옷을 입은 천사가 조용히 나타난다.)\ndlg 교수 / (꿈꾸듯, 천사를 향하여) 아, 저는 이 함정에서 뛰어나가고 싶습니다. 옛날처럼 푸른 꿈을 꾸고 싶어요. 저를 좀 도와주십시오.\ndlg 천사 / (가만히 고개를 저으며) 이미 늦었어요. 너무 늦었어요.\nstage (천사가 서서히 사라지고, 다시 감독관이 나타나 회초리를 휘두른다. 교수는 비참한 표정으로 고개를 떨군 채, 다시 번역을 시작한다. 펜을 잡은 손이 기계처럼 움직인다.)", "bogi": "풍자는 대상의 결함이나 모순을 우스꽝스럽게 드러내어 비판하는 방식이다. (가)는 광복 직후를 배경으로, 외세에 빌붙어 벼락출세한 인물과 친일로 부를 쌓고도 반성 없이 복수만 꾀하는 인물을 나란히 제시하여 기회주의적 세태를 풍자한다. (나)는 번역 노동에 묶인 채 기계처럼 살아가는 가장과, 그 희생을 당연하게 여기는 가족을 통해 물질에 짓눌려 인간성을 잃은 현대인의 삶을 풍자한다. 두 작품은 갈래는 다르지만, 인물을 희화화하고 그 언행의 모순을 드러내어 비판한다는 점에서 통한다."}, "SET5": {"label": "[25~27] 슬견설", "passage": "《슬견설(蝨犬說)》 / 이규보\n\n어떤 손[客]이 나에게 말했다. \"엊저녁에 어떤 불량한 사람이 큰 몽둥이로 돌아다니는 개를 때려죽이는 것을 보았는데, 그 모습이 너무도 비참하여 가슴이 아팠소. 그래서 이제부터는 다시는 개나 돼지의 고기를 먹지 않기로 마음먹었소.\"\n\n내가 그 말에 응대하였다. \"엊그제 어떤 사람이 불이 이글거리는 화로를 끼고 앉아 이[蝨]를 잡아 그 불에 태워 죽이는 것을 보았는데, 나는 마음이 아파 다시는 이를 잡지 않기로 맹세하였소.\"\n\n손이 실망한 듯, 또 언짢은 듯한 낯빛으로 말했다. \"이는 한낱 미물(微物)이 아니오? 나는 덩치가 큰 짐승이 죽는 것을 보고 불쌍해서 한 말인데, 그대는 구태여 이런 보잘것없고 하찮은 것에 견주니, 혹 나를 놀리는 것이오?\"\n\n내가 차분히 말했다. \"무릇 피와 기운이 있는 것이라면 사람으로부터 소, 말, 돼지, 양, 벌레, 개미에 이르기까지 모두가 한결같이 삶을 원하고 죽음을 싫어하는 법이오. 어찌 큰 것만 유독 죽음을 싫어하고, 작은 것은 그렇지 않겠소? 그러니 개와 이의 죽음은 본디 다를 것이 없는 것이오.\n\n그대가 그래도 의심스럽거든, 시험 삼아 그대의 열 손가락을 깨물어 보시오. 엄지손가락만 아프고 그 나머지는 안 아프겠소? 한 몸에 붙어 있는 큰 마디, 작은 마디 할 것 없이 모두 똑같이 아픈 법이니, 어찌 크고 작음에 따라 그 아픔에 차이가 있겠소? 그러니 그대와 내가 개와 이의 죽음을 두고 굳이 차이를 둘 까닭이 없는 것이오. 부디 달팽이의 뿔을 보거든 그것을 쇠뿔과 똑같이 보고, 메추라기를 보거든 그것을 큰 붕새와 똑같이 보도록 하시오. 그런 뒤에라야 내가 비로소 그대와 더불어 도(道)를 말할 수 있을 것이오.\"", "bogi": "변증법(辨證法)은 어떤 주장[正]이 제기되면 그에 맞서는 주장[反]이 나오고, 두 주장의 대립을 넘어 더 높은 차원의 새로운 명제[合]에 이르는 사고 방식이다. 여기서 '합'은 두 주장을 어중간하게 절충하는 것이 아니라, 둘을 끌어안으면서 더 보편적인 진리로 나아가는 것이다. 「슬견설」은 이러한 변증법적 전개를 대화의 형식으로 보여 준다. 손[客]의 통념이 '정'을 이루고, 글쓴이의 문제 제기가 '반'을 이루며, 이를 통해 '모든 생명은 동등하다'는 보편적 깨달음['합']에 이른다."}}, "obj": [{"num": 1, "score": 3.0, "set": "SET1", "kind": "obj", "stem": "(가)~(다)에 대한 설명으로 적절하지 않은 것은?", "choices": ["(가)는 '~지', '~것이' 등의 종결을 반복하여 독백적 어조를 형성하고 내면의 정서를 차분히 드러내고 있다.", "(나)는 각 연의 시상을 자연 현상과 인간사를 겹쳐 전개하여 이별을 보편적 섭리의 차원으로 끌어올리고 있다.", "(가)와 (나)는 모두 계절의 순환을 시간적 배경으로 삼아 자연의 질서에 대한 순응의 태도를 드러내고 있다.", "(다)는 행과 연의 구분 없이 줄글로 이어 쓰는 산문시의 형식을 취하여 열차의 연속적 이동감을 살리고 있다.", "(가)~(다)는 모두 부정적 상황을 제시하되 그것을 슬픔으로만 마무리하지 않는 인식의 전환을 보이고 있다."], "answer": 3, "exp": "(나)는 봄→가을의 순환적 시간이 나타나지만, (가)는 어린 시절의 회상과 현재가 교차할 뿐 '계절의 순환'을 시간적 배경으로 삼지 않는다. 따라서 (가)와 (나) '모두' 계절의 순환을 배경으로 삼는다는 진술은 적절하지 않다.", "wrong": "① (가)는 '~지', '~것이'의 반복으로 독백적 어조와 내재율을 형성하므로 적절하다. ② (나)는 낙화(자연)와 이별(인간사)을 겹쳐 전개하므로 적절하다. ④ (다)는 산문시 형식으로 이동감을 살리므로 적절하다. ⑤ 세 작품 모두 부정적 상황을 슬픔으로만 끝맺지 않으므로 적절하다.", "bogi": null, "is_gram": false}, {"num": 2, "score": 3.0, "set": "SET1", "kind": "obj", "stem": "㉠~㉢에 대한 이해로 가장 적절한 것은?", "choices": ["㉠은 화자가 두려움 때문에 떠밀려 도달한 공간으로, 삶의 고난이 시작되는 지점을 가리킨다.", "㉠과 ㉡은 동일한 시어이지만, ㉠은 이상적 세계를, ㉡은 절망의 막바지를 가리켜 의미가 서로 다르다.", "㉡은 화자가 동경하여 스스로 찾아간 이상적 세계로, 어린 시절의 순수한 소망을 표상한다.", "㉢은 화자가 끝내 벗어나야 할 대상으로, 좌절의 정서가 응축된 부정적 공간으로 제시된다.", "㉠~㉢은 모두 동일한 정서를 환기하며, 시 전체에서 일관되게 절망의 의미로만 사용되고 있다."], "answer": 2, "exp": "㉠'땅끝'은 아름다움에 취해 스스로 찾아간 '이상적 세계', ㉡'땅끝'은 살면서 몇 번은 서게 되는 '절망의 막바지'를 가리킨다. 형태는 같으나 의미가 다른 중의적 시어이므로 ②이 가장 적절하다.", "wrong": "① ㉠은 두려움에 떠밀린 곳이 아니라 스스로 동경하여 찾아간 곳이다. ③ 이상적 세계로 찾아간 것은 ㉡이 아니라 ㉠이다(주체·대상 뒤바뀜). ④ ㉢'늘 젖어 있는 땅끝'은 벗어날 대상이 아니라 희망이 고갈되지 않는 긍정적 공간이다. ⑤ ㉠~㉢은 이상·절망·희망으로 정서가 달라지므로 '절망으로만' 사용된다는 진술은 틀렸다.", "bogi": null, "is_gram": false}, {"num": 3, "score": 2.5, "set": "SET1", "kind": "obj", "stem": "㉣'분분한 낙화……'를 중심으로 (나)를 감상한 내용으로 적절하지 않은 것은?", "choices": ["'분분한'은 꽃잎이 어지럽게 흩날리는 모습을 그린 시각적 이미지로, 이별의 정황을 감각적으로 환기한다.", "말줄임표는 낙화의 여운을 남기며, 뒤이어 제시될 '결별이 이룩하는 축복'의 역설로 시상을 이어 준다.", "'결별이 이룩하는 축복'은 이별이라는 상실이 곧 성숙·결실로 이어진다는 역설적 인식을 압축한 표현이다.", "'분분한 낙화'는 화자가 자신의 의지로 막아 낸 시련을 의미하며, 운명에 맞서는 저항의 자세를 부각한다.", "'꽃답게 죽는다'는 소멸을 아름답고 의미 있는 것으로 받아들이는 화자의 달관적 태도를 드러낸다."], "answer": 4, "exp": "(나)에서 '분분한 낙화'는 운명에 '맞서는 저항'이 아니라, 가야 할 때가 오면 떠나는 자연의 순리를 '받아들이는' 달관의 태도와 연결된다. 시련을 막아 냈다거나 저항한다는 진술은 작품의 관조적·달관적 태도와 정반대이므로 적절하지 않다.", "wrong": "① '분분한'은 시각적 이미지가 맞다. ② 말줄임표는 여운을 남기며 역설로 시상을 잇는다. ③ '결별이 이룩하는 축복'은 역설적 인식의 압축이다. ⑤ '꽃답게 죽는다'는 달관적 태도를 드러낸다.", "bogi": null, "is_gram": false}, {"num": 4, "score": 2.5, "set": "SET1", "kind": "obj", "stem": "(다)의 표현상 특징으로 적절하지 않은 것은?", "choices": ["'-가네', '-부르네' 등 유사한 종결을 반복하여 운율을 형성하고 열차의 지속적인 운동감을 자아낸다.", "㉤'나발과 꽹과리를 불고 치듯'은 직유를 활용하여 열차 안의 시끌벅적한 분위기를 청각적으로 부각한다.", "마지막을 '연착하면서'로 끝맺어 종결의 단호함을 강조함으로써 여정의 종료를 분명히 매듭짓고 있다.", "'고무신', '무논', '미루나무' 등 향토적 소재를 배치하여 정겨운 농촌 풍경을 환기한다.", "'무논에 비친 푸른 봄산은 일하는 소가 등에 태우고 가네'는 대상의 위치를 뒤바꾼 참신한 이미지를 보여 준다."], "answer": 3, "exp": "(다)의 마지막 '연착하면서'는 종결 어미 없이 끝맺는 도치로, '단호한 종결'이나 '여정의 종료'를 분명히 하는 것이 아니라 오히려 여운을 남기고 느긋한 리듬을 형성한다. 따라서 ③가 적절하지 않다.", "wrong": "① 유사 종결 반복으로 운율·운동감을 살리므로 적절하다. ② ㉤은 직유로 청각적 분위기를 부각하므로 적절하다. ④ 향토적 소재로 농촌 풍경을 환기하므로 적절하다. ⑤ 봄산을 소가 등에 태우고 가는 위치 역전의 참신한 이미지가 맞다.", "bogi": null, "is_gram": false}, {"num": 5, "score": 3.5, "set": "SET1", "kind": "obj", "stem": "<보기>를 바탕으로 (가)~(다)를 감상한 내용으로 적절하지 않은 것은?", "choices": ["(가)의 '뒷걸음질'과 (다)의 '연착'은 모두 부정적 상황을 극복의 계기로 바꾸지 못한 채 좌절에 머무는 모습을 보여 준다.", "(가)에서 '위태로움 속에 아름다움이 스며 있다'는 인식은, 상실과 생성이라는 두 국면을 한자리에서 끌어안는 초극의 태도로 볼 수 있다.", "(나)에서 '결별이 이룩하는 축복'은, 이별이라는 상실을 성숙이라는 더 높은 차원으로 끌어올리는 초극의 자세를 드러낸다.", "(다)에서 '조금 조금씩 역마다 연착하면서'는, 더디고 지체되는 여정을 결함이 아니라 정겨움으로 끌어안는 태도로 이해할 수 있다.", "(가)~(다)는 모두 부정적 국면을 회피하지 않고 끌어안음으로써 단순한 슬픔을 넘어서려 한다는 점에서 <보기>의 초극과 통한다."], "answer": 1, "exp": "<보기>는 세 작품이 부정적 국면을 '끌어안아 넘어선다(초극)'고 본다. (가)의 '뒷걸음질'은 좌절에 머무는 것이 아니라 생존 의지와 함께 '땅끝은 늘 젖어 있다'는 희망 인식으로 나아가고, (다)의 '연착' 역시 정겨움으로 끌어안는 태도이다. 따라서 '좌절에 머문다'는 ①는 <보기>의 취지와 정반대로 적절하지 않다.", "wrong": "② 상실·생성을 끌어안는 초극으로 볼 수 있어 적절하다. ③ 이별을 성숙으로 끌어올리는 초극이므로 적절하다. ④ 연착을 정겨움으로 끌어안는 태도가 맞다. ⑤ 세 작품 모두 부정을 끌어안아 슬픔을 넘어서므로 적절하다.", "bogi": "(가)~(다)는 모두 부정적이거나 상실의 상황을 단순한 슬픔으로 끝맺지 않는다. (가)는 절망의 끝에서 오히려 희망을 발견하고, (나)는 소멸과 이별을 더 높은 성숙으로 끌어올리며, (다)는 더디고 흔들리는 여정 자체를 정겨움으로 끌어안는다. 이처럼 대립하는 두 국면(상실과 생성, 흔들림과 정겨움)을 한자리에서 끌어안아 더 높은 인식으로 나아가는 태도는, 부정의 상황을 회피하지 않고 끌어안아 넘어서려는 '초극(超克)'의 자세로 볼 수 있다.", "is_gram": false}, {"num": 6, "score": 2.5, "set": "SET1", "kind": "obj", "stem": "(다)의 화자에 대한 이해로 적절하지 않은 것은?", "choices": ["'나도 끼여 가네'에서 화자는 자신을 열차 안 공동체의 일원으로 인식하고 있다.", "다양한 세대와 처지의 사람들을 나란히 제시하여 삶의 여러 모습을 따뜻하게 바라본다.", "차창 밖 봄날의 풍경을 감각적으로 묘사하며 향토적 정취에 젖어 든다.", "'침침하고 눈매가 가느스름한'은 화자가 자신을 소박하게 그려 낸 자화상으로 볼 수 있다.", "지체되는 열차에 초조함을 느끼며 빨리 목적지에 닿기를 바라는 조급한 심정을 드러낸다."], "answer": 5, "exp": "(다)의 화자는 '조금 조금씩 역마다 연착하면서'의 느긋한 여정을 정겹게 받아들인다. 지체에 초조해하거나 빨리 닿기를 바라는 조급함은 나타나지 않으므로 ⑤가 적절하지 않다.", "wrong": "① '나도 끼여 가네'에서 공동체의 일원으로 인식함이 드러난다. ② 다양한 사람들을 따뜻하게 바라본다. ③ 봄날 풍경을 감각적으로 묘사하며 향토적 정취에 젖는다. ④ '침침하고 눈매가 가느스름한'은 소박한 자화상으로 볼 수 있다.", "bogi": null, "is_gram": false}, {"num": 7, "score": 2.5, "set": "SET2", "kind": "obj", "stem": "(가)와 (나)의 공통점으로 적절하지 않은 것은?", "choices": ["색채의 선명한 대비를 전면에 내세워 대상에 대한 화자의 예찬적 태도를 부각하고 있다.", "특정 시구나 통사 구조를 반복하여 시 전체에 형식적 통일감을 부여하고 있다.", "사물에 빗대어 화자 자신이나 현대인의 삶을 드러내는 비유적 표현을 활용하고 있다.", "현대 문명에 대한 화자의 비판적·반성적 인식을 바탕에 깔고 시상을 전개하고 있다.", "도시적·문명적 소재를 끌어와 그에 대한 화자의 정서와 태도를 형상화하고 있다."], "answer": 1, "exp": "(가)는 도시를 묘석·잡초로 그려 비애를 드러낼 뿐 '예찬'하지 않고, (나)도 문명을 반성·비판할 뿐 예찬하지 않는다. 또 색채의 선명한 대비를 '전면에 내세워' 예찬한다는 진술은 두 시 모두에 해당하지 않으므로 ①가 적절하지 않다.", "wrong": "② (가)는 수미상관, (나)는 '~싶다' 반복으로 형식적 통일감을 준다. ③ (가)는 도시를 묘석·잡초에, (나)는 삶을 플라스틱·무쇠 낫에 빗댄다. ④ 두 시 모두 문명에 대한 비판·반성을 깔고 있다. ⑤ 도시·문명 소재로 정서·태도를 형상화한다.", "bogi": null, "is_gram": false}, {"num": 8, "score": 2.5, "set": "SET2", "kind": "obj", "stem": "㉠~㉤에 대한 이해로 적절하지 않은 것은?", "choices": ["㉠'묘석'은 고층 건물을 비석에 빗댄 것으로, 도시를 죽음의 이미지로 형상화한다.", "㉡'잡초'는 찬란한 야경에 빗댄 것으로, 화려함의 이면에 놓인 무질서함을 드러낸다.", "㉣'시우쇠처럼 나를 달구고'는 자신을 단련하려는 화자의 의지를 드러낸다.", "㉤'무쇠 낫'은 수고로운 과정을 거쳐 빚어진 것으로, 화자가 되고자 하는 모습을 표상한다.", "㉢'플라스틱 물건'은 소모되고 버려지는 것으로, 화자가 동경하는 가치 있는 삶을 표상한다."], "answer": 5, "exp": "㉢'플라스틱 물건'은 화자가 '동경하는 가치 있는 삶'이 아니라, 한꺼번에 싸게 사서 마구 쓰다 버려지는 소모적 삶, 곧 화자가 부끄러워하며 '벗어나고자 하는' 모습이다. 따라서 ⑤이 적절하지 않다.", "wrong": "① ㉠묘석은 도시를 죽음 이미지로 그린다. ② ㉡잡초는 야경의 이면의 무질서를 드러낸다. ③ ㉣은 자기 단련의 의지를 드러낸다. ④ ㉤무쇠 낫은 화자가 되고자 하는 모습이다.", "bogi": null, "is_gram": false}, {"num": 9, "score": 2.5, "set": "SET2", "kind": "obj", "stem": "(가)에 대한 설명으로 적절하지 않은 것은?", "choices": ["처음과 끝에 동일한 시구를 배치하는 수미상관 구조로 주제를 강조하고 안정감을 준다.", "'피부의 바깥에 스미는 어둠'은 시각적 대상을 촉각화한 공감각적 이미지로 볼 수 있다.", "'무거운 비애'는 추상적 감정을 무게라는 감각으로 구체화하여 정서의 깊이를 드러낸다.", "'어딜 가라는', '어디로 어떻게 가라는' 등 의문형 종결로 방향 상실의 정서를 심화한다.", "'공허한 군중의 행렬에 섞이어'는 군중과의 연대 속에서 고독을 극복하는 화자를 보여 준다."], "answer": 5, "exp": "'공허한 군중의 행렬에 섞이어'는 군중과의 '연대·고독 극복'이 아니라, 많은 사람 속에서도 느끼는 '군중 속의 고독'을 드러낸다. 따라서 ⑤가 적절하지 않다.", "wrong": "① 수미상관 구조로 주제를 강조한다. ② '스미는 어둠'은 시각→촉각의 공감각이다. ③ '무거운 비애'는 감정을 무게로 구체화한다. ④ 의문형 종결로 방향 상실을 심화한다.", "bogi": null, "is_gram": false}, {"num": 10, "score": 2.5, "set": "SET2", "kind": "obj", "stem": "(나)의 화자에 대한 이해로 적절하지 않은 것은?", "choices": ["'버스에서 뛰어내리고 싶다'는 무기력하게 떠밀려 가는 일상에서 벗어나려는 소망을 드러낸다.", "'달구고-벼리고-갈아'의 과정은 자신을 치열하게 단련하려는 지향을 단계적으로 보여 준다.", "'땀 흘리며 두들겨 하나씩 만들어 낸'은 수고로운 노동의 가치를 긍정하는 태도를 담는다.", "'대장간 벽에 걸리고 싶다'는 현실의 노동에서 완전히 벗어나 안주하려는 도피 심리를 나타낸다.", "'온통 부끄러워지고'는 소모적으로 살아온 자신에 대한 반성적 인식을 드러낸다."], "answer": 4, "exp": "'대장간 벽에 걸리고 싶다'는 노동에서 벗어나 '도피·안주'하려는 것이 아니라, 땀 흘려 빚어진 호미처럼 가치 있는 존재가 되고 싶다는 '지향'을 드러낸다. 도피 심리로 본 ④는 적절하지 않다.", "wrong": "① 버스에서 뛰어내림은 일상 탈출의 소망이다. ② 달구고·벼리고·갈아는 단계적 자기 단련이다. ③ 땀 흘린 노동의 가치를 긍정한다. ⑤ '부끄러워지고'는 반성적 인식이다.", "bogi": null, "is_gram": false}, {"num": 11, "score": 3.5, "set": "SET2", "kind": "obj", "stem": "<보기>를 바탕으로 (가)와 (나)를 감상한 내용으로 적절하지 않은 것은?", "choices": ["(가)와 (나)는 모두 현대 문명에 적극적으로 맞서 그것을 변혁하려는 실천적 의지를 직접적으로 표출한다.", "(가)의 '늘어선 고층 창백한 묘석같이'는 도시를 죽음의 이미지로 그려, 문명을 응시하는 화자의 비애와 통한다.", "(가)의 '내 어디로 어떻게 가라는'은 방향을 잃은 화자의 모습으로, <보기>의 '관조와 비애'의 태도와 맞닿는다.", "(나)의 '플라스틱 물건처럼 느껴질 때'는 소모품처럼 살아가는 자신에 대한 반성으로, '반성과 지향' 중 반성에 해당한다.", "(나)의 '시퍼런 무쇠 낫으로 바꾸고 싶다'는 가치를 빚어내는 삶에 대한 동경으로, '반성과 지향' 중 지향에 해당한다."], "answer": 1, "exp": "<보기>에 따르면 (가)는 '관조와 비애', (나)는 '반성과 지향'의 태도로 문명을 응시한다. 두 시 모두 문명에 '적극적으로 맞서 변혁하려는 실천적 의지를 직접 표출'하지는 않으므로 ①가 적절하지 않다.", "wrong": "② 묘석 비유는 비애와 통한다. ③ 방향 상실은 관조와 비애의 태도와 맞닿는다. ④ 플라스틱 비유는 반성에 해당한다. ⑤ 무쇠 낫은 지향에 해당한다.", "bogi": "김광균의 (가)와 김광규의 (나)는 모두 현대 문명에 대한 화자의 인식을 드러낸다. (가)의 화자는 도시의 밤거리에서 방향을 잃은 채 군중 속의 고독과 근원적 비애를 느끼며, 도시를 죽음과 무질서의 이미지로 그려 낸다. 한편 (나)의 화자는 대량 생산·소비되는 문명 속에서 소모품처럼 살아가는 자신을 반성하고, 수고로운 노동으로 가치를 빚어내는 삶을 동경한다. 두 시는 각각 '관조와 비애', '반성과 지향'이라는 서로 다른 태도로 현대 문명을 응시한다.", "is_gram": false}, {"num": 12, "score": 2.5, "set": "SET3", "kind": "obj", "stem": "윗글의 서술상 특징으로 적절하지 않은 것은?", "choices": ["서술자가 인물의 내면 심리에 직접 개입하여 그 정서를 분석적으로 제시하고 있다.", "예상과 어긋나는 반전을 통해 사건의 긴장을 높이고 주제 의식을 부각하고 있다.", "토속적 어휘와 구어체를 활용하여 향토적 분위기와 해학성을 함께 자아내고 있다.", "공간적 배경을 사실적으로 묘사하는 데 치중하여 사건의 전개를 의도적으로 지연하고 있다.", "인물 간 대화를 제시하여 사건의 정황과 인물의 처지를 구체적으로 드러내고 있다."], "answer": 4, "exp": "윗글은 도둑의 정체가 동생으로 밝혀지는 사건 전개가 빠르게 이어진다. '공간적 배경의 사실적 묘사에 치중'하여 사건 전개를 '지연'한다고 볼 근거는 없으므로 ④가 적절하지 않다.", "wrong": "① '심정은 실로 알 수 없다', '눈물이다' 등 서술자가 심리에 개입해 분석한다. ② 도둑=동생이라는 반전으로 긴장과 주제를 부각한다. ③ '말가웃', '에―이 고얀 놈' 등 토속어·구어체로 해학을 자아낸다. ⑤ 응오·응칠의 대화로 정황과 처지를 드러낸다.", "bogi": null, "is_gram": false}, {"num": 13, "score": 2.5, "set": "SET3", "kind": "obj", "stem": "윗글의 인물에 대한 이해로 적절하지 않은 것은?", "choices": ["응오가 '내 것 내가 먹는데 누가 뭐래?'라고 한 것은 자기 벼를 훔쳐야 하는 부조리한 처지를 드러낸다.", "응칠이 봇짐이 '말가웃'밖에 안 됨을 확인하는 장면은 동생의 절박한 처지에 대한 당혹감과 연민을 보여 준다.", "응칠이 '황소라도 한 마리 몰아 오자'고 한 것은 동생을 돕는 길이 또 다른 범법뿐인 현실을 드러낸다.", "응칠이 응오를 매질한 것은 동생의 정직함을 끝내 경멸하여 인연을 끊으려는 냉혹함을 보여 준다.", "응칠이 매질 끝에 아우를 업고 내려오는 것은 야속함 속에서도 가족애가 남아 있음을 보여 준다."], "answer": 4, "exp": "응칠의 매질은 동생을 '경멸하여 인연을 끊으려는' 것이 아니라, 도와주려는 마음(황소 제안)이 거절당한 데서 온 야속함의 표현이며, 끝내 아우를 업고 내려오는 데서 가족애가 드러난다. 따라서 ④는 인물의 정서를 정반대로 본 것이라 적절하지 않다.", "wrong": "① '내 것 내가 먹는데'는 부조리한 처지를 드러낸다. ② '말가웃' 확인은 당혹감·연민을 보여 준다. ③ 황소 제안은 돕는 길이 범법뿐인 현실을 드러낸다. ⑤ 업고 내려오는 데서 가족애가 드러난다.", "bogi": null, "is_gram": false}, {"num": 14, "score": 2.5, "set": "SET3", "kind": "obj", "stem": "윗글의 구절에 대한 이해로 적절하지 않은 것은?", "choices": ["'복면을 벗기고 보니 — 다름 아닌 동생 응오였다'는 독자의 예상을 뒤집는 극적 반전에 해당한다.", "'에―이 고얀 놈'은 표면상 꾸짖음이지만 실제로는 동생을 향한 연민이 담긴 반어적 표현이다.", "'볼을 적시는 것은 눈물이다'는 부조리한 현실 앞에서 응칠이 느끼는 비애를 함축한다.", "'언제나 철이 날는지 딱한 일이었다'는 도둑질을 부끄러워하는 응칠이 동생의 무모함을 꾸짖는 말이다.", "'명색이 성이라며?'는 형으로서 동생을 돕고자 한 마음이 거절당한 데 대한 야속함을 드러낸다."], "answer": 4, "exp": "'언제나 철이 날는지'는 도둑질을 일삼는 응칠이 오히려 '정직한' 동생을 철없다고 여기는 가치 전도의 아이러니이다. 응칠이 '도둑질을 부끄러워하는' 인물이라는 전제가 작품과 어긋나므로 ④가 적절하지 않다.", "wrong": "① 복면을 벗기는 장면은 극적 반전이다. ② '에―이 고얀 놈'은 연민이 담긴 반어이다. ③ '눈물'은 부조리한 현실 앞의 비애를 함축한다. ⑤ '명색이 성이라며?'는 거절당한 야속함을 드러낸다.", "bogi": null, "is_gram": false}, {"num": 15, "score": 3.5, "set": "SET3", "kind": "obj", "stem": "<보기>를 바탕으로 윗글을 감상한 내용으로 적절하지 않은 것은?", "choices": ["성실한 응오가 자기 벼를 스스로 훔치는 상황은, 정직한 농민조차 범법자로 내모는 모순된 구조를 드러낸다.", "'만무방'이라는 제목은 응오 개인의 도덕적 타락을 부각하기보다, 그를 그렇게 만든 사회 구조를 겨냥한 것이다.", "작가는 응오를 윤리적으로 단죄함으로써, 어떤 상황에서도 법을 어겨서는 안 된다는 교훈을 직접 제시한다.", "'내 걸 내가 훔쳐야 할 그 운명'은 개인의 게으름이 아니라 착취 구조가 빚어낸 비극임을 보여 준다.", "도둑인 응칠이 마을에서 부러움을 사는 설정은, 정직한 노동이 보상받지 못하는 현실을 냉소적으로 고발한다."], "answer": 3, "exp": "<보기>는 작가가 '만무방'을 개인의 윤리 문제가 아니라 모순된 사회 구조의 산물로 본다고 했다. 작가가 응오를 '윤리적으로 단죄'하거나 준법의 교훈을 '직접 제시'한다는 ③는 <보기>의 취지와 정반대이므로 적절하지 않다.", "wrong": "① 자기 벼를 훔치는 상황은 모순된 구조를 드러낸다. ② 제목은 사회 구조를 겨냥한다. ④ '운명'은 착취 구조의 비극이다. ⑤ 도둑이 부러움을 사는 설정은 현실을 냉소적으로 고발한다.", "bogi": "「만무방」의 제목은 '염치없이 막되어 먹은 사람'을 뜻한다. 그러나 작가는 이 말을 도덕적으로 타락한 개인을 비난하기 위해 쓰지 않는다. 성실한 소작농 응오가 자기 논의 벼를 스스로 훔쳐야 하는 상황에서 보듯, 당대의 농민은 아무리 정직하게 일해도 도지·장리·색조와 빚에 짓눌려 살아갈 수 없었다. 곧 '만무방'은 개인의 윤리 문제가 아니라, 정직한 농민조차 범법자로 내모는 모순된 사회 구조가 빚어낸 인간형이다. 작가는 이를 상황적 반어와 해학을 통해 냉소적으로 고발한다.", "is_gram": false}, {"num": 16, "score": 2.5, "set": "SET3", "kind": "obj", "stem": "윗글에 나타난 '상황적 반어'에 대한 설명으로 가장 적절한 것은?", "choices": ["도둑을 잡으려 잠복한 응칠이 정작 도둑인 동생을 잡게 된 상황은, 기대와 결과가 어긋나는 반어를 이룬다.", "응오가 벼를 훔친 까닭이 끝내 밝혀지지 않음으로써, 사건의 인과가 은폐되는 반어가 형성된다.", "응칠이 동생을 업고 내려오는 결말은 갈등이 완전히 해소되었음을 알리는 반어적 화해에 해당한다.", "마을 사람들이 응칠을 부러워하는 것은 그가 실제로 부유하기 때문이며, 이는 반어와 무관하다.", "응오가 형의 황소 도둑 제안을 받아들이는 장면에서, 두 형제의 가치관이 일치하는 반어가 나타난다."], "answer": 1, "exp": "도둑을 잡으려 밤새 잠복한 응칠이 정작 '도둑'으로 잡은 사람이 다름 아닌 성실한 동생이라는 점은, 기대(범인을 잡아 누명을 벗음)와 결과(동생이 범인)가 정반대로 어긋나는 상황적 반어이다. 따라서 ①이 가장 적절하다.", "wrong": "② 응오가 벼를 훔친 까닭(착취로 살 수 없음)은 작품에 드러나므로 '은폐'가 아니다. ③ 결말은 갈등의 '완전한 해소'가 아니라 비극적 여운을 남긴다. ④ 응칠은 부유하지 않으며, 부러움 자체가 반어적 설정이다. ⑤ 응오는 황소 제안을 '거절'하므로 가치관 일치가 아니다.", "bogi": null, "is_gram": false}, {"num": 17, "score": 2.5, "set": "SET4", "kind": "obj", "stem": "(가)와 (나)의 공통점으로 적절하지 않은 것은?", "choices": ["인물을 우스꽝스럽게 그려 냄으로써 그 인물이 지닌 모순이나 결함을 부각하고 있다.", "당대 사회의 부조리한 현실에 대한 비판적 시선을 바탕에 두고 사건을 전개하고 있다.", "서술자가 작품 밖에서 사건을 요약하고 인물의 심리를 직접 논평하여 주제를 전달하고 있다.", "인물의 말과 실제 처지(또는 행동) 사이의 괴리를 통해 풍자의 효과를 거두고 있다.", "과장된 언행이나 상황을 통해 대상에 대한 비판적·냉소적 태도를 드러내고 있다."], "answer": 3, "exp": "(가)는 소설로 서술자가 인물의 심리를 직접 논평할 수 있으나, (나)는 희곡으로 '서술자가 없고' 대사·지시문으로만 전달된다. 따라서 서술자의 직접 논평을 '공통점'으로 보는 ③는 적절하지 않다.", "wrong": "① 두 작품 모두 인물을 희화화한다. ② 두 작품 모두 부조리한 현실 비판을 깐다. ④ (가)는 허세와 몰락, (나)는 '열렬한 책임감'과 실상의 괴리로 풍자한다. ⑤ 과장된 언행·상황으로 냉소적 태도를 드러낸다.", "bogi": null, "is_gram": false}, {"num": 18, "score": 2.5, "set": "SET4", "kind": "obj", "stem": "(가)의 인물에 대한 이해로 적절하지 않은 것은?", "choices": ["방삼복이 S소위에게 어퍼컷을 맞는 결말은, 그가 잘못을 뉘우치고 새사람이 되었음을 보여 준다.", "방삼복이 '내 말 한마디면 안 되는 일이 없다'고 한 것은 외세에 기댄 권세를 과시하는 허세를 보여 준다.", "백주사가 겉으로 '잘 부탁하네'라고 하면서 속으로 '고이연 놈'이라 한 것은 표리부동한 태도를 드러낸다.", "방삼복이 '코삐뚤이 삼복'에서 '미스터 방'이 된 내력은 능력 없는 자의 벼락출세를 보여 준다.", "백주사가 방삼복에게 빌붙는 모습은 친일로 잃은 기득권을 되찾으려는 욕망에서 비롯된 것이다."], "answer": 1, "exp": "방삼복이 양칫물 사건으로 S소위에게 어퍼컷을 맞는 결말은 기회주의자의 허세가 한순간에 무너지는 '몰락'을 희화적으로 보여 줄 뿐, 그가 '잘못을 뉘우치고 새사람이 되었음'을 의미하지 않는다. 따라서 ①가 적절하지 않다.", "wrong": "② '내 말 한마디면'은 허세를 보여 준다. ③ '잘 부탁하네/고이연 놈'은 표리부동이다. ④ 코삐뚤이→미스터 방은 벼락출세이다. ⑤ 백주사의 청탁은 기득권 회복 욕망이다.", "bogi": null, "is_gram": false}, {"num": 19, "score": 2.5, "set": "SET4", "kind": "obj", "stem": "(나)에 대한 이해로 적절하지 않은 것은?", "choices": ["'원고지 무늬'로 뒤덮인 무대와 '쇠사슬'은 인물의 삶을 옭아매는 구속을 시각적으로 형상화한다.", "장남이 관객을 향해 직접 말을 건네는 것은 등장인물이 해설자를 겸하는 서사극적 기법에 해당한다.", "'원고가 바로 돈'이라는 처의 말은 인간을 노동·금전의 수단으로만 보는 물질주의적 태도를 드러낸다.", "'이미 늦었어요'라는 천사의 말은 잃어버린 꿈을 되찾을 수 없는 교수의 비극성을 암시한다.", "감독관이 사라지고 천사가 끝까지 남는 결말은 교수가 마침내 굴레에서 벗어났음을 보여 준다."], "answer": 5, "exp": "(나)에서는 천사가 '서서히 사라지고' 감독관이 '다시 나타나' 교수가 비참하게 번역을 재개한다. 천사가 끝까지 남아 교수가 굴레에서 벗어난다는 ⑤는 작품 내용과 정반대이므로 적절하지 않다.", "wrong": "① 원고지 무늬·쇠사슬은 구속의 시각화이다. ② 장남의 관객 대상 발화는 서사극적 기법이다. ③ '원고가 바로 돈'은 물질주의적 태도이다. ④ '이미 늦었어요'는 비극성을 암시한다.", "bogi": null, "is_gram": false}, {"num": 20, "score": 2.5, "set": "SET4", "kind": "obj", "stem": "(가)와 (나)의 표현 방식을 비교한 내용으로 가장 적절한 것은?", "choices": ["(가)는 인물의 외양 묘사를 배제하지만, (나)는 인물의 내면을 직접 서술하여 심리를 전달한다.", "(가)와 (나)는 모두 서술자의 목소리를 빌려 사건의 의미를 관객에게 직접 설명한다.", "(가)는 현재 시제로, (나)는 과거 시제로 서술하여 사건의 시간적 거리를 조절한다.", "(가)는 서술자의 편집자적 논평을 통해, (나)는 무대 지시문과 대사를 통해 인물을 형상화한다.", "(가)와 (나)는 모두 무대 상연을 전제로 하여 대사와 지시문만으로 사건을 전개한다."], "answer": 4, "exp": "(가)는 소설로 서술자의 편집자적 논평(판소리 사설체)을 통해, (나)는 희곡으로 무대 지시문과 대사를 통해 인물을 형상화한다. 갈래의 차이를 정확히 짚은 ④이 가장 적절하다.", "wrong": "① (가)도 '코삐뚤이' 등 외양을 드러내고, (나)는 희곡이라 내면을 '직접 서술'할 수 없다. ② (나)에는 서술자가 없다. ③ 시제 대비는 근거가 없다. ⑤ 무대 상연을 전제로 하는 것은 (나)뿐이다.", "bogi": null, "is_gram": false}, {"num": 21, "score": 3.5, "set": "SET4", "kind": "obj", "stem": "<보기>를 바탕으로 (가)와 (나)를 감상한 내용으로 적절하지 않은 것은?", "choices": ["(가)에서 방삼복의 벼락출세와 허세는, 외세에 빌붙은 기회주의를 우스꽝스럽게 드러내는 풍자로 볼 수 있다.", "(가)에서 백주사가 반성 없이 복수만 꾀하는 모습은, 친일 세력의 뻔뻔함을 겨냥한 풍자로 이해할 수 있다.", "(가)와 (나)는 모두 풍자의 대상이 된 인물을 동정의 시선으로 그려, 그들의 처지에 대한 연민을 부각한다.", "(나)에서 가족이 교수의 희생을 당연하게 여기는 모습은, 물질에 짓눌린 인간관계를 겨냥한 풍자로 볼 수 있다.", "(나)에서 '열렬한 책임감'이라는 장남의 말은, 기계적 노동의 굴레를 미화하는 모순을 드러내는 풍자로 볼 수 있다."], "answer": 3, "exp": "<보기>는 두 작품이 인물의 모순을 '비판'하는 풍자임을 말한다. 특히 (가)의 방삼복·백주사는 동정이나 연민의 대상이 아니라 비판·조롱의 대상이다. 두 작품이 풍자 대상을 '동정의 시선'으로 그려 연민을 부각한다는 ③는 적절하지 않다.", "wrong": "① 방삼복의 허세는 기회주의 풍자이다. ② 백주사의 모습은 친일 세력 풍자이다. ④ 가족의 태도는 물질주의 풍자이다. ⑤ '열렬한 책임감'은 굴레를 미화하는 모순의 풍자이다.", "bogi": "풍자는 대상의 결함이나 모순을 우스꽝스럽게 드러내어 비판하는 방식이다. (가)는 광복 직후를 배경으로, 외세에 빌붙어 벼락출세한 인물과 친일로 부를 쌓고도 반성 없이 복수만 꾀하는 인물을 나란히 제시하여 기회주의적 세태를 풍자한다. (나)는 번역 노동에 묶인 채 기계처럼 살아가는 가장과, 그 희생을 당연하게 여기는 가족을 통해 물질에 짓눌려 인간성을 잃은 현대인의 삶을 풍자한다. 두 작품은 갈래는 다르지만, 인물을 희화화하고 그 언행의 모순을 드러내어 비판한다는 점에서 통한다.", "is_gram": false}, {"num": 22, "score": 2.5, "set": "SET5", "kind": "obj", "stem": "윗글에 대한 이해로 적절하지 않은 것은?", "choices": ["손은 큰 짐승인 개의 죽음에는 연민을 느끼지만 이의 죽음은 하찮게 여긴다.", "글쓴이는 이의 죽음을 안타까워하며 다시는 이를 잡지 않겠다고 말한다.", "글쓴이는 생명의 크기에 따라 죽음을 싫어하는 정도가 다르다고 본다.", "손은 글쓴이가 개의 죽음과 이의 죽음을 견준 것을 자신에 대한 조롱으로 받아들인다.", "글쓴이는 손에게 사물을 크고 작음으로 차별하지 말 것을 권한다."], "answer": 3, "exp": "글쓴이는 '어찌 큰 것만 죽음을 싫어하고 작은 것은 그렇지 않겠소?'라며 크기와 무관하게 모든 생명이 죽음을 싫어한다고 본다. 생명의 크기에 따라 죽음을 싫어하는 정도가 다르다는 ③는 글쓴이의 생각과 정반대이므로 적절하지 않다.", "wrong": "① 손은 개의 죽음에 연민을, 이의 죽음은 하찮게 여긴다. ② 글쓴이는 이를 잡지 않겠다고 한다. ④ 손은 견줌을 조롱으로 받아들인다('나를 놀리는 것이오?'). ⑤ 글쓴이는 크고 작음으로 차별하지 말 것을 권한다.", "bogi": null, "is_gram": false}, {"num": 23, "score": 2.5, "set": "SET5", "kind": "obj", "stem": "<보기>를 바탕으로 윗글을 이해한 내용으로 적절하지 않은 것은?", "choices": ["개의 죽음은 슬퍼하면서 이의 죽음은 하찮게 여기는 손의 통념은 '정'에 해당한다.", "글쓴이가 손의 통념을 절반쯤 받아들여 둘을 어중간하게 절충한 것이 '합'에 해당한다.", "이의 죽음도 개의 죽음과 다르지 않다는 글쓴이의 문제 제기는 '반'에 해당한다.", "'개와 이의 죽음은 다를 것이 없다'는 인식은 정과 반을 끌어안은 '합'으로 볼 수 있다.", "'합'에 이르러 도달한 '모든 생명은 동등하다'는 깨달음은 보편적 진리에 해당한다."], "answer": 2, "exp": "<보기>에서 '합'은 두 주장을 '어중간하게 절충하는 것이 아니라' 더 보편적 진리로 나아가는 것이라 했다. 글쓴이가 손의 통념을 절반쯤 받아들여 절충한 것이 '합'이라는 ②는 <보기>의 '합' 개념과 정반대이므로 적절하지 않다.", "wrong": "① 손의 통념은 '정'이다. ③ 글쓴이의 문제 제기는 '반'이다. ④ '개와 이의 죽음은 다를 것이 없다'는 '합'이다. ⑤ '모든 생명은 동등하다'는 보편적 진리이다.", "bogi": "변증법(辨證法)은 어떤 주장[正]이 제기되면 그에 맞서는 주장[反]이 나오고, 두 주장의 대립을 넘어 더 높은 차원의 새로운 명제[合]에 이르는 사고 방식이다. 여기서 '합'은 두 주장을 어중간하게 절충하는 것이 아니라, 둘을 끌어안으면서 더 보편적인 진리로 나아가는 것이다. 「슬견설」은 이러한 변증법적 전개를 대화의 형식으로 보여 준다. 손[客]의 통념이 '정'을   // 1) HTML 이스케이프
  let s=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 2) 밑줄 마커 ⟦...⟧ → <u>...</u>
  s=s.replace(/\u27e6([^\u27e7]*)\u27e7/g,'<u class="ul">$1</u>');
  return s;
}

function renderExam(){
  const area=$('#examArea'); area.innerHTML='';
  let lastSet=null;
  // 선택형
  DATA.obj.forEach(q=>{
    // 세트 지문: 세트가 바뀌고 문학일 때 지문 카드 삽입
    if(!q.is_gram && q.set!==lastSet){
      const p=makePassage(q.set);
      if(p) area.appendChild(p);
      lastSet=q.set;
    }
    if(q.is_gram && lastSet!=='GRAM'){
      area.appendChild(el('div','sectiontitle','■ 문법 [25~30]'));
      lastSet='GRAM';
    }
    area.appendChild(renderObj(q));
  });
  // 서답형
  area.appendChild(el('div','sectiontitle','■ 서답형 [1~5] (직접 작성 후 자기 채점)'));
  DATA.sub.forEach(q=> area.appendChild(renderSub(q)));
}

function renderObj(q){
  const card=el('div','q'); card.id='q'+q.num;
  const head=el('div','qhead');
  head.appendChild(el('span','qnum',q.num+'.'));
  head.appendChild(el('span','qscore',q.score+'점'));
  if(q.is_gram) head.appendChild(el('span','qtag','문법'));
  card.appendChild(head);
  card.appendChild(el('div','qstem',escapeHtml(q.stem)));
  if(q.bogi){
    const b=el('div','bogi');
    b.appendChild(el('div','blabel','〈 보 기 〉'));
    b.appendChild(el('div',null,escapeHtml(q.bogi)));
    card.appendChild(b);
  }
  const ul=el('ul','choices');
  q.choices.forEach((c,i)=>{
    const li=el('li','choice');
    li.appendChild(el('span','ci',CIRC[i]));
    li.appendChild(el('span',null,escapeHtml(c)));
    li.onclick=()=>selectChoice(q.num,i+1,li);
    ul.appendChild(li);
  });
  card.appendChild(ul);
  // 해설 영역(빈)
  const ex=el('div','explain'); ex.id='exp'+q.num;
  card.appendChild(ex);
  return card;
}

function selectChoice(num,val,li){
  if(submitted) return;
  answers[num]=val;
  const card=$('#q'+num);
  card.querySelectorAll('.choice').forEach(c=>c.classList.remove('sel'));
  li.classList.add('sel');
  updateProgress();
}

function renderSub(q){
  const card=el('div','q'); card.id='sub'+q.num;
  const head=el('div','qhead');
  head.appendChild(el('span','qnum','서답형 '+q.num));
  head.appendChild(el('span','qscore',q.score+'점'));
  if(q.is_gram) head.appendChild(el('span','qtag','문법'));
  card.appendChild(head);
  card.appendChild(el('div','qstem',escapeHtml(q.stem)));
  if(q.bogi){
    const b=el('div','bogi');
    b.appendChild(el('div','blabel','〈 보 기 〉'));
    b.appendChild(el('div',null,escapeHtml(q.bogi)));
    card.appendChild(b);
  }
  if(q.cond&&q.cond.length){
    const cb=el('div','condbox');
    cb.appendChild(el('b',null,'&lt;조건&gt;'));
    const ol=el('ol');
    q.cond.forEach(c=>ol.appendChild(el('li',null,escapeHtml(c))));
    cb.appendChild(ol); card.appendChild(cb);
  }
  const area=el('div','subarea');
  const ta=el('textarea'); ta.id='ta'+q.num; ta.placeholder='여기에 답안을 작성하세요...';
  area.appendChild(ta); card.appendChild(area);
  const ex=el('div','explain'); ex.id='subexp'+q.num;
  card.appendChild(ex);
  return card;
}

function updateProgress(){
  const done=Object.keys(answers).length;
  $('#sDone').textContent=done;
  if(!submitted){
    const pct=Math.round(done/DATA.obj.length*100);
    $('#hBar').style.width=pct+'%';
  }
}

function startExam(){
  $('#intro').classList.add('hidden');
  $('#examArea').classList.remove('hidden');
  $('#submitbar').classList.remove('hidden');
  renderExam();
  window.scrollTo(0,0);
}

function submitExam(){
  const done=Object.keys(answers).length;
  if(done<DATA.obj.length){
    if(!confirm(`아직 ${DATA.obj.length-done}문항이 미응답입니다. 그래도 제출할까요?`)) return;
  }
  submitted=true;
  let objScore=0, correct=0, objTotal=0;
  DATA.obj.forEach(q=>{
    objTotal+=q.score;
    const card=$('#q'+q.num);
    const lis=card.querySelectorAll('.choice');
    lis.forEach((li,i)=>{
      li.classList.add('disabled');
      if(i+1===q.answer) li.classList.add('correct');
      if(answers[q.num]===i+1 && i+1!==q.answer) li.classList.add('wrong');
    });
    const isC=answers[q.num]===q.answer;
    if(isC){objScore+=q.score;correct++;}
    // 해설
    const ex=$('#exp'+q.num); ex.classList.add('show');
    ex.innerHTML=`<div class="res ${isC?'o':'x'}">${isC?'정답 ✓':'오답 ✗'}　정답: <span class="ans">${CIRC[q.answer-1]}</span></div>`+
      `<div><span class="lbl">해설</span> ${escapeHtml(q.exp)}</div>`+
      (q.wrong?`<div style="margin-top:8px"><span class="wrong-lbl">오답 피하기</span> ${escapeHtml(q.wrong)}</div>`:'');
  });
  // 서답형: 모범답안 + 자기채점 버튼
  DATA.sub.forEach(q=>{
    const ex=$('#subexp'+q.num); ex.classList.add('show');
    const ta=$('#ta'+q.num); if(ta) ta.readOnly=true;
    ex.innerHTML=
      `<div class="modelans"><span class="lbl">모범 답안</span><br>${escapeHtml(q.answer)}</div>`+
      (q.exp?`<div><span class="lbl">해설</span> ${escapeHtml(q.exp)}</div>`:'')+
      (q.crit&&q.crit.length?`<div class="crit"><b>채점 기준</b><br>${q.crit.map(escapeHtml).join('<br>')}</div>`:'')+
      `<div class="gradebtns"><button class="og" onclick="gradeSub(${q.num},'o',this)">맞음 (${q.score}점)</button>`+
      `<button class="xg" onclick="gradeSub(${q.num},'x',this)">틀림 (0점)</button></div>`;
  });
  // 결과 표시
  window._objScore=objScore; window._correct=correct;
  showResult();
  $('#submitbar').classList.add('hidden');
  $('#hScoreLabel').textContent='점수';
  window.scrollTo({top:0,behavior:'smooth'});
}

function gradeSub(num,grade,btn){
  subGrades[num]=grade;
  const wrap=btn.parentElement;
  wrap.querySelectorAll('button').forEach(b=>b.classList.remove('sel-o','sel-x'));
  btn.classList.add(grade==='o'?'sel-o':'sel-x');
  showResult();
}

function showResult(){
  const objScore=window._objScore||0, correct=window._correct||0;
  let subScore=0, subCorrect=0;
  DATA.sub.forEach(q=>{ if(subGrades[q.num]==='o'){subScore+=q.score;subCorrect++;} });
  const total=objScore+subScore;
  $('#result').classList.add('show');
  $('#rScore').textContent=total+'점';
  $('#rSub').textContent=`선택형 ${objScore}점 + 서답형 ${subScore}점 (서답형은 자기 채점 반영)`;
  $('#rObj').textContent=correct+'/'+DATA.obj.length;
  $('#rSub2').textContent=subCorrect+'/'+DATA.sub.length;
  $('#rRate').textContent=Math.round((correct+subCorrect)/(DATA.obj.length+DATA.sub.length)*100)+'%';
  $('#hScore').textContent=total;
  $('#hBar').style.width='100%';
}

function reviewAll(){ $('#examArea').scrollIntoView({behavior:'smooth'}); }
function restartExam(){
  answers={}; subGrades={}; submitted=false;
  window._objScore=0; window._correct=0;
  $('#result').classList.remove('show');
  $('#hScore').textContent='0'; $('#hScoreLabel').textContent='진행'; $('#hBar').style.width='0%';
  $('#examArea').classList.add('hidden'); $('#intro').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

setTitle();
$('#footNote').textContent='제출 후 모든 문항의 정답·해설·오답 피하기가 표시됩니다. 서답형은 모범답안과 대조해 직접 채점하세요.';
</script>
</body>
</html>
