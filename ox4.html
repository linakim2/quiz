<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국어 O·X 변형 문제집</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --paper:#F6F7F2; --paper-line:rgba(29,52,97,0.06);
  --white:#FFFFFF; --ink:#1D3461; --ink-soft:#3C5481;
  --red:#C23B2B; --red-bg:#FBE7E3; --red-soft:#e8a59e;
  --gold:#A56B00; --gold-bg:#FBF1DC;
  --green:#3D6B2C; --green-bg:#E7F0DE;
  --card:#FFFFFF; --line:#D8DCD0; --muted:#6B7280;
  --shadow:0 1px 3px rgba(29,52,97,0.06),0 4px 16px rgba(29,52,97,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;color:#202425;-webkit-font-smoothing:antialiased;
  background:repeating-linear-gradient(0deg,var(--paper-line) 0,var(--paper-line) 1px,transparent 1px,transparent 28px),var(--paper);}

/* ── Top bar ── */
.top-bar{
  position:sticky;top:0;z-index:200;
  background:var(--ink);color:#fff;
  display:flex;align-items:center;gap:14px;
  padding:0 18px;height:50px;
  box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.top-bar h1{
  font-family:'Noto Serif KR',serif;font-weight:900;font-size:15.5px;
  flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.score-pill{
  background:rgba(255,255,255,.14);border:1.5px solid rgba(255,255,255,.28);
  border-radius:99px;padding:4px 13px;font-size:12.5px;font-weight:700;
  white-space:nowrap;
}
.score-pill em{font-style:normal;color:#7CDFB0;}

/* ── Set tabs ── */
.tabs-bar{
  background:var(--white);border-bottom:2px solid var(--line);
  overflow-x:auto;-webkit-overflow-scrolling:touch;height:44px;
}
.tabs-inner{display:flex;padding:0 10px;min-width:max-content;height:100%;}
.stab{
  display:flex;align-items:center;gap:5px;
  padding:0 16px;font-size:13px;font-weight:600;
  color:var(--muted);cursor:pointer;
  border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
  user-select:none;height:100%;
}
.stab:hover{color:var(--ink);}
.stab.active{color:var(--ink);border-bottom-color:var(--ink);}
.stab .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--gold);opacity:0;flex:0 0 auto;
}
.stab.in-progress .dot{opacity:1;}

/* ── Two-pane layout ── */
.layout{
  display:grid;
  grid-template-columns:350px 1fr;
  height:calc(100vh - 50px - 44px);
}

/* ── Passage pane ── */
.pp{
  display:flex;flex-direction:column;
  border-right:2px solid var(--line);
  background:var(--white);
  overflow:hidden;
}
.pp-head{
  padding:12px 15px 10px;
  border-bottom:1.5px solid var(--line);
  flex:0 0 auto;
}
.pp-head .eye{font-size:10px;letter-spacing:.13em;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.pp-head h3{font-family:'Noto Serif KR',serif;font-weight:900;font-size:16px;color:var(--ink);line-height:1.25;}
.pp-head .src{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:2px;}

/* Work selector tabs */
.work-tabs{display:flex;border-bottom:1.5px solid var(--line);flex:0 0 auto;overflow-x:auto;}
.wtab{
  padding:7px 14px;font-size:12.5px;font-weight:700;
  color:var(--muted);cursor:pointer;
  border-bottom:2.5px solid transparent;margin-bottom:-1.5px;
  white-space:nowrap;flex:0 0 auto;
}
.wtab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Passage scrollable body */
.pp-body{flex:1;overflow-y:auto;padding:14px 15px 20px;position:relative;}
.p-label{font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.p-text{
  font-family:'Noto Serif KR',serif;font-size:14px;
  line-height:1.95;color:#1a1f22;white-space:pre-wrap;word-break:keep-all;
}
.p-empty{
  padding:24px 0 16px;text-align:center;
  color:var(--muted);font-size:13.5px;line-height:1.7;
}
.p-empty small{display:block;font-size:11.5px;margin-top:4px;opacity:.75;}
.paste-btn{
  display:block;margin:14px auto 0;padding:7px 20px;
  background:none;border:1.5px dashed var(--gold);
  color:var(--gold);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;
}
.paste-btn:hover{background:var(--gold-bg);}

/* Edit area */
.edit-wrap{display:none;flex-direction:column;gap:9px;padding:12px 15px 16px;flex:0 0 auto;}
.edit-wrap textarea{
  width:100%;height:280px;
  font-family:'Noto Serif KR',serif;font-size:13.5px;line-height:1.85;
  padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;
  resize:vertical;outline:none;
}
.edit-wrap textarea:focus{border-color:var(--gold);}
.edit-btns{display:flex;gap:8px;justify-content:flex-end;}
.save-btn{
  padding:6px 18px;background:var(--ink);color:#fff;
  border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;
}
.cancel-btn{
  padding:6px 18px;background:none;
  border:1.5px solid var(--line);border-radius:7px;
  font-size:13px;cursor:pointer;color:var(--muted);
}

/* ── Questions pane ── */
.qp{
  overflow-y:auto;
  padding:16px 20px 60px;
}

/* filter bar */
.fbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:18px;
  padding-bottom:12px;border-bottom:1.5px solid var(--line);
}
.chips{display:flex;gap:6px;}
.chip{
  border:1.5px solid var(--line);background:var(--white);
  border-radius:99px;padding:5px 12px;font-size:12.5px;
  cursor:pointer;color:#3a3f42;font-weight:500;
}
.chip.active{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);font-weight:700;}
.reset-btn{
  border:1.5px dashed var(--ink-soft);background:none;
  color:var(--ink-soft);border-radius:99px;padding:5px 12px;font-size:12.5px;cursor:pointer;
}
.reset-btn:hover{background:rgba(29,52,97,.05);}

/* question block */
.qblock{margin-bottom:26px;}
.qhead{
  display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  padding:10px 0 8px 10px;border-left:4px solid var(--gold);margin-bottom:9px;
}
.qtext{font-size:14px;font-weight:700;color:var(--ink);line-height:1.45;flex:1;}
.qtext .qn{font-family:'Noto Serif KR',serif;font-weight:900;}
.reveal-q{
  flex:0 0 auto;padding:5px 11px;
  background:none;border:1.5px solid var(--muted);
  border-radius:7px;font-size:11.5px;color:var(--muted);cursor:pointer;white-space:nowrap;
}
.reveal-q:hover{border-color:var(--ink);color:var(--ink);}

/* item card */
.item{
  background:var(--card);border:1.5px solid var(--line);
  border-radius:10px;padding:12px 14px 13px;margin-bottom:8px;
  box-shadow:var(--shadow);
}
.i-top{display:flex;align-items:flex-start;gap:9px;}
.tag{
  flex:0 0 auto;font-size:11px;font-weight:700;
  padding:3px 7px;border-radius:5px;margin-top:1.5px;
}
.tag.orig{background:#E4EAF3;color:var(--ink);}
.tag.var{background:var(--gold-bg);color:var(--gold);}
.stmt{font-size:14.5px;line-height:1.6;flex:1;}

/* O/X */
.oxrow{display:flex;gap:7px;margin-top:11px;}
.oxbtn{
  flex:1;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--line);border-radius:8px;background:var(--white);
  padding:7px 0;font-family:'Gaegu',sans-serif;font-size:22px;font-weight:700;
  cursor:pointer;color:#aab0b5;transition:.1s ease;
}
.oxbtn:hover:not(.locked){border-color:var(--ink-soft);color:var(--ink-soft);}
.oxbtn.pick-o{background:#EBF0F8;border-color:var(--ink);color:var(--ink);}
.oxbtn.pick-x{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.oxbtn.locked{cursor:default;}

/* answer reveal */
.a-toggle{
  display:none;margin-top:9px;width:100%;
  padding:5px 0;background:none;
  border:1.5px dashed var(--ink-soft);border-radius:8px;
  font-size:12.5px;color:var(--ink-soft);cursor:pointer;
}
.a-toggle.vis{display:block;}
.a-toggle:hover{background:rgba(29,52,97,.04);}
.a-box{
  display:none;margin-top:8px;padding:12px 14px;
  border-radius:8px;border-left:4px solid var(--line);background:#F8F9FA;
  font-size:13.5px;line-height:1.65;
}
.a-box.vis{display:block;}
.a-box.ok{border-left-color:#6F9A52;background:var(--green-bg);}
.a-box.ng{border-left-color:var(--red);background:var(--red-bg);}
.a-verdict{
  font-family:'Gaegu',sans-serif;font-size:16px;font-weight:700;
  margin-bottom:5px;display:flex;align-items:center;gap:5px;
}
.a-verdict.ok{color:var(--green);}
.a-verdict.ng{color:var(--red);}
.a-ans{font-weight:700;color:var(--ink);font-size:13px;}
.a-exp{margin-top:5px;color:#333;}
.a-exp b{color:var(--ink);}

/* ── Mobile ── */
@media(max-width:700px){
  html,body{height:auto;overflow:auto;}
  .layout{grid-template-columns:1fr;height:auto;}
  .pp{max-height:250px;border-right:none;border-bottom:2px solid var(--line);}
  .pp-body{max-height:160px;}
  .qp{padding:14px 12px 60px;}
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>국어 고전·현대 문학 O·X 변형 문제집</h1>
  <div class="score-pill">정답 <em id="scoreEl">0</em>/330</div>
</div>

<div class="tabs-bar">
  <div class="tabs-inner" id="tabsEl"></div>
</div>

<div class="layout">
  <!-- Passage pane -->
  <aside class="pp" id="passagePane">
    <div class="pp-head">
      <div class="eye">지문 · 본문</div>
      <h3 id="ppTitle"></h3>
      <div class="src" id="ppSrc"></div>
    </div>
    <div class="work-tabs" id="workTabsEl"></div>
    <div class="pp-body" id="ppBody"></div>
    <div class="edit-wrap" id="editWrap">
      <textarea id="editTA" placeholder="여기에 지문을 그대로 붙여 넣으세요..."></textarea>
      <div class="edit-btns">
        <button class="cancel-btn" onclick="cancelEdit()">취소</button>
        <button class="save-btn" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </aside>

  <!-- Questions pane -->
  <main class="qp" id="qpEl">
    <div class="fbar">
      <div class="chips" id="chipsEl">
        <button class="chip active" data-f="all">전체 보기</button>
        <button class="chip" data-f="orig">원본만</button>
        <button class="chip" data-f="var">변형만</button>
      </div>
      <button class="reset-btn" id="resetBtn">이 세트 초기화</button>
    </div>
    <div id="qlist"></div>
  </main>
</div>

<script>
const DATA = {
  "sets": [
    {
      "id": "set9",
      "title": "오월 소식 · 와사등",
      "source": "정지용, 「오월 소식」 / 김광균, 「와사등」",
      "passages": [
        {
          "label": "(가) 오월 소식 — 정지용",
          "text": "오동나무꽃으로 불 밝힌 이곳 첫여름이 그립지 아니한가?\n어린 나그네 꿈이 시시로 파랑새가 되어 오려니.\n나무 밑으로 가나 책상 턱에 이마를 고일 때나,\n네가 남기고 간 기억만이 소곤소곤거리는구나.\n\n모처럼 만에 날아온 소식에 반가운 마음이 울렁거리어\n가여운 글자마다 먼 황해가 남실거리나니.\n\n……나는 갈매기 같은 종선을 한창 치달리고 있다……\n\n쾌활한 오월 넥타이가 내처 난데없는 순풍이 되어,\n하늘과 딱 닿은 푸른 물결 우에 솟은,\n외따른 섬 로맨틱을 찾아갈까나.\n\n일본 말과 아라비아 글씨를 가르치러 간\n쬐그만 이 페스탈로치야, 꾀꼬리 같은 선생님이야,\n날마다 밤마다 섬 둘레가 근심스런 풍랑에 씹히는가 하노니,\n은은히 밀려오는 듯 머얼리 우는 ⓐ오르간 소리……\n- 정지용, 「오월 소식」\n*종선: 큰 배에 딸린 작은 배."
        },
        {
          "label": "(나) 와사등 — 김광균",
          "text": "차단─한 등불이 하나 비인 하늘에 걸려 있다\n내 호올로 어델 가라는 슬픈 신호냐\n\n긴─ 여름 해 황망히 나래를 접고\n늘어선 고층 창백한 묘석같이 황혼에 젖어\n찬란한 야경 무성한 잡초인 양 헝클어진 채\n사념 벙어리 되어 입을 다물다\n\n피부의 바깥에 스미는 어둠\n낯설은 거리의 ⓑ아우성 소리\n까닭도 없이 눈물겹고나\n\n공허한 군중의 행렬에 섞이어\n내 어디서 그리 무거운 비애를 지니고 왔기에\n길─게 늘인 그림자 이다지 어두워\n\n내 어디로 어떻게 가라는 슬픈 신호기\n차단─한 등불이 하나 비인 하늘에 걸리어 있다\n- 김광균, 「와사등」\n*와사등: 석탄 가스를 도관에 흐르게 하여 불을 켜는 등."
        }
      ],
      "questions": [
        {
          "num": 1,
          "desc": "(가)와 (나)에 대한 설명으로 가장 적절한 것은? (정답 ④)",
          "items": [
            {
              "tag": "1-① 원본",
              "text": "(가)는 (나)와 달리 배경 묘사를 통해 화자의 상황을 나타내고 있다.",
              "answer": "X",
              "explain": "(가)는 '하늘과 딱 닿은 푸른 물결 위에 솟은 외따른 섬'을 묘사하며 그리운 이를 향한 화자의 상황을 나타내고 있다. (나) 역시 '늘어선 고층 창백한 묘석같이 황혼에 젖어'라는 배경 묘사를 통해 도시에서 부정적인 감각을 받는 화자의 상황을 나타내고 있다. 따라서 두 작품 모두 배경 묘사를 통해 화자의 상황을 드러내고 있으므로 (가)에만 해당한다는 진술은 적절하지 않다."
            },
            {
              "tag": "1-① 변형",
              "text": "(가)와 (나)는 모두 배경 묘사를 통해 화자가 처한 상황을 나타내고 있다.",
              "answer": "O",
              "explain": "(가)는 외따른 섬이라는 배경을, (나)는 창백한 묘석 같은 고층 건물과 황혼에 젖은 도시 풍경을 배경으로 묘사하여 각각 화자가 처한 상황(그리움, 도시적 비애)을 드러내고 있다."
            },
            {
              "tag": "1-② 원본",
              "text": "(가)는 (나)와 달리 자연물을 의인화하여 역동적인 분위기를 조성하고 있다.",
              "answer": "X",
              "explain": "(가)의 '네가 남기고 간 기억만이 소곤소곤거리는구나'에서 의인법이 사용되었지만, 의인화된 대상이 자연물인 '기억'이 아니라 추상 명사이다. 또한 역동적인 분위기를 조성한다고 보기 어렵다. (나)에도 자연물을 의인화한 표현은 나타나지 않는다."
            },
            {
              "tag": "1-② 변형",
              "text": "(가)에서 '기억만이 소곤소곤거리는구나'는 의인법에 해당하지만, 의인화된 대상이 자연물이 아니라 추상 명사이므로 '자연물을 의인화하였다'는 진술은 적절하지 않다.",
              "answer": "O",
              "explain": "'기억'은 자연물이 아닌 추상 명사이므로 이를 의인화한 표현을 두고 '자연물을 의인화했다'고 볼 수 없다. 또한 이 표현이 역동적인 분위기를 조성하는 것도 아니다."
            },
            {
              "tag": "1-③ 원본",
              "text": "(나)는 (가)와 달리 공간의 이동에 따라 변화하는 시적 분위기를 드러내고 있다.",
              "answer": "X",
              "explain": "(나)의 시적 배경은 도시의 밤거리로 일정하게 유지되며, 공간의 이동이 나타나지 않는다. 시 전반에 걸쳐 화자는 도시 문명 속의 고독감과 비애감을 일관되게 드러낼 뿐 시적 분위기가 변화하지 않는다. (가)에서도 공간 이동은 나타나지 않는다."
            },
            {
              "tag": "1-③ 변형",
              "text": "(가)와 (나) 모두 공간의 이동 없이 일관된 정서가 유지되며, 공간 이동에 따른 시적 분위기의 변화는 나타나지 않는다.",
              "answer": "O",
              "explain": "(가)는 일본 경도에서의 그리움, (나)는 도시의 밤거리에서의 고독감이 시 전반에 걸쳐 일관되게 유지될 뿐, 두 작품 모두 공간 이동에 따른 분위기 변화가 나타나지 않는다."
            },
            {
              "tag": "1-④ 원본",

          "label": "세상에서 제일 무거운 틀니 — 박완서",
          "text": "  내 기억으론 내 외당숙이 조성구였지만 그가 조정구라니 조정구가 틀림없다 싶었다. 그가 설사 내 딸 연이가 현이라고 했다면 아마 내 딸은 현이였음에 틀림없을 것이다.\n  나는 그 앞에 그렇게 무력했고 그는 그렇게 전능했다. 그는 내가 완전히 허탈 상태에 빠진 것을 확인한 후 비로소 엄숙히 선언했다.\n  6·25 때 의용군으로 나간 오빠가 이북에서 밀봉교육을 받고 곧 남파되리라는 것이었다. 먼저 남파됐다가 체포된 간첩에 의해 확인된 정확한 정보란다.\n  오빠는 오면 반드시 집에 들를 테고 그러면 어떻게 하겠느냐고 그는 물었다.\n  \"㉠어떡하긴요. 그야 당연히 시, 신고를 하거나 자수를 시켜야죠.\"\n  나는 아주 밉고 서툴게 아양을 떨었다.\n  \"㉡잘 생각하셨습니다. 아주머니만 믿겠습니다.\"\n  그리고 그는 협조해 줘서 고맙다고 덧붙였다. 나도 고맙다고 서너 번 고개를 조아리고 또 한 번 아양을 떨었다. 그리고 놓여났다. 남편과 어머니가 같은 꼴을 당한 건 말할 것도 없고 충청도 진천에서 거의 한 마을을 이루고 살고 있는 외가와 그 밖에 오빠가 알 만한 대소가가 다 한 번씩 그런 일을 당한 것을 후에 알게 되었다.\n  그로부터 대문 소리에 가슴이 내려앉는 날이 시작되었다.\n  \"㉢말이 자수지, 그놈이 벌써 마흔인데 그곳에 계집자식이 없을 리 없을 테니 이 에미 말을 들을까? 계집 자식 생각이 앞설 테지. 차라리 넘어오다…….\"\n  어머니는 말끝을 흐리고 눈물을 닦는다. 그러나 나는 다음 말을 알고 있다. 나도 방금 그런 생각을 하고 있었으니까. 어머니보다 훨씬 진작부터 그런 생각을 하고 있었으니까. 넘어오다 차라리 사살되었으면 하고.\n  간첩이 된 혈연과는 상봉이 몰고 올 사건과의 당면이 두려운 나머지 십팔 평 블록 집 속의 안일이 소중한 나머지, 어머니와 나는 마녀(魔女)보다도 더 잔인해졌다.\n\n[중략 부분 줄거리] '나'의 이웃인 설희 엄마는 장애를 가진 딸을 키우며 살아간다. '나'는 그런 그녀에게 힘겹게 현실을 살아간다는 데 동병상련의 감정을 느끼면서 월북한 오빠와 관련된 집안 사정을 털어놓기도 한다. 그러던 어느 날 미국에 가 있던 설희 엄마의 남편이 취직을 하고, 설희 엄마는 딸과 함께 미국으로 떠난다.\n\n  그 틀니는 해 넣은 지가 삼 년은 되었고, 몸에 닿는 것에 좀 지나칠 정도의 결벽성을 가진 나는 실상 내 경제 사정으론 분수에 넘칠 만큼 고가로 한 것으로 일류 치과에서 해 넣은 것이어서 처음부터 크게 불편한 줄 몰랐으나 어찌 된 영문인지 가끔 마음이 울적하다든가 몸이 불편할 때에는 이 틀니가 쑤셨다. 아니 정확히 말해서 틀니가 얹힌 턱뼈가 쑤신달까.\n  의사는 뭐 인체의 거부 반응이라든가 하는 어려운 말로 내 동통을 진찰하고 시일이 지나면 자연히 나을 거라 했지만 삼 년이 지나도록 거부 반응은 불쑥불쑥 나를 괴롭혔다.\n  그 동통과 중압감은 경우에 따라 경중의 차이가 있는데 오늘은 아주 심한 편이었다.\n\n  틀니가 천근의 무게로 턱뼈를 눌러 꼭 턱이 떨어지고 말 것 같았다. 나는 손으로 턱을 받쳐도 보고, 슬슬 주물러도 보고, 더위 먹은 짐승처럼 턱을 축 늘어뜨려 입을 헤벌리고 침을 흘려도 보았으나, 턱뼈가 부서질 듯한 동통은 조금도 덜어지지 않았다.\n  몸의 온갖 신경이 턱뼈를 중심으로 방사선으로 전신에 퍼진 듯, 중압감에 수반한 동통은 턱뼈에서 목구멍으로, 귓속으로 골로 퍼져 내 두상은 완전히 틀니의 횡포가 지배했다.\n  누가 이런 고통을 감히 짐작이나 할 수 있으랴. 이 고통에서 벗어나는 길은 오직 틀니를 빼는 길밖에 없겠는데 나는 틀니를 빼고 있는 내 모습에 늘 몸서리를 쳐 왔으므로 차중에서나 길에서 사람들의 시선을 의식하며 차마 그 짓은 할 수 없었다.\n  어찌어찌해서 가까스로 내 집 문 앞까지 왔을 즈음 나는 거의 발광 직전이었다.\n[A]\n\n  방에 들어서자마자 입을 크게 벌리고 침을 질질 흘려 가며 틀니를 뽑아냈다.\n  양쪽 두 개씩 도합 네 개의 어금니가 심어진 반달 모양의 섬세한 백금 틀은 내 손바닥에서 거의 무게를 지니지 않은 채 차게 빛났다.\n  마침내 무서운 동통과 중압감으로부터 자유로워진 내 몸은 가볍다 못해 공중으로 둥실 뜨는 듯했다.\n  이럴 수가, 이렇게 가벼울 수가, 우화이등선(羽化而登仙)이란 이런 기분을 두고 이름인가.\n  나는 내 편안감을 충분히 만끽하기 위해 몸을 장판 위에 눕혔다.\n  그 여편네 설희 엄마는 지금쯤 어디를 날고 있을까? ㉣제아무리 공중에 떠 있기로서니, 말도 많고 탈도 많은 온갖 사는 어려움부터 벗어났기로서니 지금의 나만큼이야 가볍고 편할쏘냐. 나는 코웃음을 친다.\n  지금의 내 팔자는 그렇게 편타.\n\n  그런데 아까부터 누가 대문을 조심스럽게 두들기고 있지 않은가. 어머니가 누구냐고 몇 번 묻는 것 같다.\n  그래도 대답 없이 똑똑 두들기기만 한다. 어머니의 신소리가 들린다. 나는 별안간 가슴이 두방망이질을 한다.\n  대문 소리가 나고 아주 낮은 대화가 들린다. 분명 상대는 남자다. 그것도 사십 대의 남자.\n  남의 이목을 꺼리듯 대화는 여전히 수군수군 낮다.\n  드디어 올 것이 오고 만 것이다! 이제 끝장이다. 파멸이다. 오오 이렇게 파멸이 쉬 올 줄이야.\n  숨죽은 대화는 아직도 계속된다. 어머니는 자수 권고에 실패한 눈치다. 이렇게 오래 끄는 걸 보니.\n  가엾은 어머니! 어쩌면 그 남자는 어머니에게 도리어 월북을 권하고 아니 협박하고 있는지도 모른다. 혹시 강제로 납치하려는 거나 아닌지.\n  그렇게끔 내버려둘 수는 없지. 나는 벌떡 일어난다. 그 남자와 죽든 살든 결판을 내고 말 테다. 나에게 '그 남자'는 이미 조금도 오빠일 필요가 없다. 그냥 '그 남자'다.\n[B]\n\n  막 나가려는데 어머니가 문을 걸고 돌아 들어온다.\n  \"㉤아유 별 끈덕진 사내도 다 봤네. 월부 책을 사라고 어찌나 조르는지…… 말이 그렇게 청산유수고 신수도 희멀겋던데 고작 월부 장사밖에 해 먹을 게 없나, 쯧쯧.\"\n  나는 다시 장판방에 눕는다. 한숨을 휴우 내쉰다. 그런데 이미 좀 전의 편안감은 없다.\n  옴짝달싹할 수 없으면서도 펄펄 뛰지 않고는 또 못 배길 것 같은 중압감과 동통이 여전하지 않은가? 이미 입속엔 빼 버릴 틀니도 없는데.\n  빼 버릴 틀니가 없기에 그 고통은 절망적이다.\n  나는 비로소 깨닫는다. 여태껏 얼마나 교묘하게 스스로를 이중 삼중으로 기만하고 있었나를.\n  내 아픔은 결코 틀니에서 기인한 아픔이 아니었던 것이다.\n  나는 설희 엄마가 부러워서, 이 나라와 이 나라의 풍토가 주는 온갖 제약으로부터 자유로워진 그녀가 부러워서, 그녀에의 선망과 질투로 그렇게도 몹시 아팠던 것이다.\n  나는 그런 아픔이 부끄러운 나머지 틀니의 아픔으로 삼으려 들었고, 나를 내리누르는 온갖 한국적인 제약의 중압감, 마침내 이 나라를 뜨는 설희 엄마와 견주어 한층 못 견디게 느껴지는 중압감조차 틀니의 중압감으로 착각하려 들었던 것이다.\n- 박완서, 「세상에서 제일 무거운 틀니」"

        {
          "label": "왕수재취득용녀설 — 작자 미상",
          "text": "  상사가 일행에게 말했다.\n  \"하늘엔 바람 한 점 없고 바다엔 작은 파도 하나 없는데 이런 뜻밖의 변고를 당해 사흘 동안이나 앞으로 나아가지 못하니, 이 일을 어찌하면 좋단 말인가?\"\n  배 안에 있던 한 사람이 말했다.\n  \"이는 필히 해신(海神)이 우리를 가로막고 장난하는 것입니다. 정성을 다해 기도를 올리면 당장 길을 갈 수 있을 것입니다.\"\n  상사는 그 말을 옳게 여겼다. ㉠이에 목욕재계하고 제문을 지어 고한 뒤 제물을 갖추어 제사를 지내 보았지만 별다른 변화가 없었다. 다시 두 번 세 번 제사를 지내 보았지만 역시 배는 움직이지 않았다. 사정이 이러하니 일행 중에 두려움에 떨지 않는 사람이 없었다. 상사가 물었다.\n  \"정성을 다해 기도했거늘 이처럼 효력이 없으니, 이 일을 어쩌면 좋단 말인가?\"\n  일행 모두가 입을 다물고 한마디도 하지 못했다. 이때 왕수재가 말했다.\n  \"이는 분명 일행 중에 부정한 자가 있어 함께 갈 수 없으므로 해신이 우리를 가로막고 장난하는 것입니다. 부정한 이를 찾아낸 다음 버려두고 데려가지 않는다면 우리를 가로막고 희롱하는 일이 바로 없어질 것입니다.\"\n  상사가 말했다. / \"그 사람을 어떻게 알아내서 버리고 간단 말이냐?\"\n  수재가 말했다.\n  \"알아낼 방법이 있습니다. 모든 사람이 각자 자기 윗옷의 옷깃을 잡고 해신에게 이렇게 고하면 됩니다. '영험하신 신의 밝은 계시를 알고자 저희 옷깃에 이름을 써서 바다에 던지려고 합니다. 가도 되는 사람의 옷은 물속에 가라앉혀 보이지 않게 하시고, 갈 수 없는 사람의 옷은 물 위에 띄워 가라앉지 않게 해 주십시오. 영험하신 뜻을 보여 주시면 마땅히 가르침대로 거행할 것입니다.' 이렇게 해 보시는 게 좋겠습니다.\"\n  상사가 말했다. / \"그 말에 묘리가 있구나.\"\n  이에 모든 사람이 수재의 말대로 윗옷을 벗어 손수 그 옷깃을 잡고 기도한 뒤 옷을 물에 던졌다. ㉡모든 옷이 곧바로 가라앉아 그림자도 보이지 않았지만, 유독 수재의 옷 하나만이 물 위에 떠 가라앉지 않았다. 부사 이하 모두가 의아하게 여겨 수재의 옷을 향해 돌을 던졌다. 돌이 수재의 옷 위에 있었건만 옷은 끝내 가라앉지 않았다. 일행 모두가 고개를 돌려 왕수재를 계속 쳐다보았다. 상사가 수재에게 말했다.\n  \"네 말대로 옷을 던져 보았는데, 유독 네 옷만이 물 위에 떠서 끝내 가라앉질 않는구나. 이 일을 어쩌면 좋겠느냐?\"\n  수재가 대답했다.\n\n\"이는 신이 초래한 일입니다. 제 운명이 그렇다는데, 더 무슨 말을 하겠습니까? 제가 이번 사행에 따라오기를 자청했던 건 중국 수도의 장려한 모습을 보고 대장부의 울울한 심사를 풀고 싶어서였습니다. 하지만 지금 해신이 이처럼 길을 막고 장난을 하니 제가 어찌 감히 억지로 떠날 수가 있겠습니까? 이제 저는 바다에 빠져 죽겠지만, 사신 일행은 만리 길을 무사히 다녀오셔서 임금의 명을 욕되이 하지 않으시기만을 바랄 뿐입니다.\"\n[A]\n\n  그렇게 말하더니 몸을 날려 바다로 뛰어들려 했다.\n\n[중략 부분 줄거리] 상사와 일행은 바다로 뛰어들려는 왕수재를 만류한 후 가까운 섬에 내려 주고 떠난다. 섬에 도착한 왕수재는 대숲 사이로 난 길을 따라가다 초가집을 발견하고, 그곳에서 자신을 기다리던 노인으로부터 음식을 대접받는다.\n\n  이윽고 날이 어두워지자 노인은 불을 붙여 등을 켜고 앉더니 한숨을 내쉬며 이렇게 말했다.\n\n\"수재는 잠깐 이 늙은이의 말을 좀 들어 보오. 나는 본래 속세 사람이 아니라 서해 용왕의 아들이라오. 이 섬에 산 지도 벌써 천 년이 넘었소. 구름을 타고 하늘에 오를 날이 이제 겨우 몇 년 남았는데, 불행히도 이 섬에 사는 삼천 년 묵은 구미호가 내 집을 빼앗으려 하고 있소. 닷새 동안 일전을 벌였지만, 늙은 내가 구미호에게 대항하는 게 너무 힘들어 수재의 귀신같은 활 솜씨를 좀 빌렸으면 하오. 나를 좀 도와달라고 수재를 이런 궁벽한 땅에 모셔 오게 했으니, 참으로 미안하고 죄송스럽기 그지없소이다.\"\n[B]\n\n  수재가 물러나 앉더니 이렇게 말했다.\n  \"저는 속세의 천한 사람이고 선생께선 용궁의 귀한 아드님이신데, 어찌 감히 한자리에 나란히 앉을 수 있겠습니까? 게다가 저는 원래 아무 재주가 없는 사람이니 어찌 감히 선생의 청을 감당할 수 있겠습니까?\"\n  노인이 말했다.\n  \"수재가 신궁이라는 건 오래전부터 알고 있거늘, 겸손이 지나치시군요. 모레가 구미호와 싸우기로 한 날이오. 수재께서는 한번 수고로움을 아끼지 말고 이 늙은이를 위험한 처지에서 구해 주시기 바라오.\"\n  \"선생의 말씀이 이러하니 어찌 감히 온 힘을 다하지 않을 수 있겠습니까? 하지만 지금 활도 없고 화살도 없으니 어쩌면 좋겠습니까?\"\n  \"튼튼한 활과 독화살을 준비해 놓은 지 이미 오래니, 그 일은 염려 마시오.\"\n  밤이 깊어 피곤해지자 각자 잠자리에 들었다. 수재는 잠에 곯아떨어져 날이 새는지도 몰랐다.\n  ㉢오후가 되자 종소리, 북소리, 피리 소리가 멀리서부터 점점 가까이 들려왔다. 소리가 청아한 것이 인간 세계의 음악과는 달랐다. 수재가 노인에게 물었다.\n  \"하늘에서 울려 퍼지는 저 음악 소리는 뭡니까?\"\n  노인은 이마를 찌푸리며 대답했다.\n  \"요사스런 구미호의 짓이라오.\"\n  \"일개 요물일 뿐인 여우가 어떻게 이런 신선의 음악 소리를 낼 수 있습니까?\"\n  \"저 구미호는 변화무쌍한 놈이오. 귀신이 되었다가는 인간이 되고, 바람을 부르고 비를 내리게 하며, 앞에 있는가 싶으면 어느새 뒤에 가 있으니, 실로 천하의 요물이라 할 수 있소. 지금 이리로 오는 게 분하니 수재도 곧 보게 될 거요.\"\n  조금 있으니 \"물렀거라!\" 하는 소리가 점점 가까이 들려왔다. 수재가 몸을 숨기고 바라보니 부인 한 사람이 임금이 타는 가마 위에 앉아 있었다. 휘장을 활짝 열어젖히고 있어 그 얼굴을 볼 수 있었는데, 꽃처럼 아름다운 얼굴과 달처럼 고운 자태에서 온갖 교태가 피어나 보는 사람의 눈을 황홀하게 하고 마음을 격동시켰다. ㉣위엄 있는 의장(儀仗)이며 온갖 물건과 의식이 임금이 출입할 때와 똑같았다. 어여쁘게 단장한 시비들이 앞뒤를 에워쌌고 기치와 창검이 좌우로 빽빽이 늘어서 있었는데, 피리 불고 북 치는 이들 모두가 곱게 분을 바른 미녀들이었다. 수재가 노인에게 말했다.\n  \"저게 모두 요망한 여우들입니까?\"\n  \"그렇소.\"\n  \"그렇다면 빨리 활과 화살을 갖다주세요! 가마 위의 부인을 쏴 죽여야겠으니.\"\n  \"안 돼요, 안 돼! 지금 활을 쐈다가는 한 번에 백 발의 화살을 쏜다 한들 한 손으로 막아 낼 테니, 소용없는 일이오.\"\n  \"그렇다면 내일 싸움에서 저와 같은 사람 열 명이 있다 한들 화살을 모조리 다 막아 낼 텐데 어쩔 작정이십니까?\"\n  \"내일 나하고 한창 싸울 때에는 저 요물도 다른 생각을 할 겨를이 없을 테니, 화살이나 돌이 날아드는 걸 알아차리지 못할 거요. 그 틈을 타서 명치를 쏜다면 성공할 수 있소이다. 내일까지 기다립시다.\"\n  이튿날 과연 요망한 여우가 많은 군졸을 거느리고 와서 싸움을 걸었다. ㉤노인은 수재에게 거듭 부탁을 하고는 싸움을 하러 바다로 나섰는데, 바다 위를 마치 평지 밟듯이 다녔다. 수재는 화살을 메기고 시위를 잔뜩 당겨 부인을 쏘려 했지만, 부인의 얼굴이 너무도 아름다운 것을 보고는 차마 활을 쏠 수가 없었다. 수재는 이렇게 생각했다.\n  '저건 사람이다. 여우가 둔갑을 한다고 어찌 저리될 수 있겠나? 사람이 사람을 쏴 죽여서야 되겠는가?'\n  결국 활을 쏘지 못한 채 시위를 당기고 있던 손을 풀었다. 곧이어 노인과 부인은 한바탕 큰 싸움을 끝낸 뒤 각자 자기 진영으로 돌아갔다.\n- 작자 미상, 「왕수재취득용녀설」\n*의장: 천자(天子)나 왕공(王公) 등 지위가 높은 사람이 행차할 때에 위엄을 보이기 위하여 격식을 갖추어 세우는 병장기(兵仗器)나 물건."

          "text": "[제5막] 표 생원 거리\n꼭두각시: 내 얼굴은 뉘 탓이오? 강원도 가서 영감 찾느라고 깊은 산중에 도토리묵을 먹어서 그렇게 되었소.\n표 생원: 뭐 어쩌고 어째여? 산골에서 묵을 먹고 얼굴이 저 모양새가 되었으면, 나는 함경도 백두산에 다녀서 삼수갑산(三水甲山)으로 나올 제 강냉이와 상수리를 통째로 삶아 먹었는데 우툴두툴커녕 ㉠내 얼굴엔 네가 나막신을 신고 다녀 봐라. 해괴망측스런 년. 요사스런 계집도 많다. (사이) 그러나 생각하니 개천에 나도 용은 용이요, 짚으로 만들어도 신주(神主)는 신주라니 돌모리집한테 훈계하여 큰마누라에게 상우례나 시켜 보자. 여보게 돌모리집네! (돌모리집을 불러 앞에 세우고 꼭두각시에 대하여) 여보 부인, 그러나저러나 객담(客談)은 그만두고 살아갈 이야기나 합시다. 부인이 어느덧 환갑이 넘고, 내가 연만(年滿) 팔십에 늙어 가난하고, 따라서 일점혈육(一點血肉)이 슬하에 없으니 이런 낭패가 어디 있나? 그러므로 부인도 근심이 되지요?\n꼭두각시: 여러 해포 만에 만나긴 만났으나 그도 또한 나 역시 근심이오.\n표 생원: 부인의 말이 그러하니 말이오. 내가 그전에 작은집을 하나 얻었소.\n꼭두각시: 아이고 듣던 중 상쾌한 말이오. 이 형편에 큰 집 작은 집을 어찌 가리겠소. 집을 얻었으니 재목(材木)이나 성하며 양지바르고 또 장인들 담가 놨겠소?\n표 생원: 어으? 아 이게 무슨 소리여? 장은 무슨 장이며, 재목은 무슨 재목? 떡 줄 놈은 생각도 안 하는데 김칫국 먼저 마시네. 소실(小室)을 얻었단 말이여.\n꼭두각시: 아이고 영감, 이게 무슨 소리요? 이날껏 찾아다니면서 나중에 이런 험한 꼴을 보자고 영감을 찾았구려.\n표 생원: 잔말 말고 주는 거나 먹고 지내지.\n꼭두각시: ㉡그러나저러나 적어도 큰마누라요, 커도 작은마누라니 인사나 시키오.\n표 생원: 여보게, 돌모리집네! 법은 법대로 하세.\n돌모리집: 무얼 말이오?\n표 생원: 큰부인한테 인사나 하게.\n돌모리집: 머지 않은 좌석에서 들어도 알겠소. 내가 적어도 용산 삼개 돌모리집이라면 장안 안이 다 아는 터인데, 유명한 표 생원이기로 가문을 보고 살기어든 날더러 작은집이라 업신여겨 큰부인에게 인사를 하여라, 절을 하여라 하니 잣골 내시댁 문 앞인가 절은 웬 절이여? 인사도 싫고 나는 갈 터이니 큰마누라하고 잘 사소. (돌아선다.)\n표 생원: ㉢돌모리집네! 여직 살던 정리(情理)로 그럴 수가 있나? 오뉴월 불도 쬐다 물러나면 서운하다네. 마음을 돌려 인사하게.\n돌모리집: 그러면 인사해 볼까요? (아무 말 없이 화가 나서 꼭두각시한테 머리를 딱 들이받으며) 인사 받으우.\n꼭두각시: (놀래며) 이게 웬일이요? 여보 영감! 이게 웬일이요. 요사이 인사 예절은 이러하오? 인사 두 번만 받으면 내 머리는 간다 봐라 하겠구나. 인사도 싫으니 세간을 나눠 주오.\n표 생원: 괘씸스런 계집들은 불같은 욕심은 있구나. 나의 집은 해남 관머리요 몸 지체는 한양 성중인데 무슨 세간 무슨 재물을 나눠 주니? 짚은 몽둥이로 한번 치면 다 죽으리라. (표 생원이 화를 내고 있는데 박 첨지가 나온다.)\n박 첨지: 실례 말씀이요만은 잠시 지내다 보니 남의 집안 문제나 내 몸은 일개 구장(區長)으로 모르는 체할 수 없어 물어보니 허물치 마오.\n표 생원: 네, 구장이십니까? 판결 좀 하여 주시오. 제가 해남 사는 표 생원으로 부부 이별하고 그간 소실을 얻어 이곳에 왔다가 저기 선 저 화상(꼭두각시를 가리키며)은 나의 큰마누라인데 작은집으로 감정을 내어 세간을 나눠 달라 하오니 백계무책(百計無策)이오. 어찌할는지요?\n박 첨지: 그러면 세 분이 다 객지(客地)이오?\n표 생원: 여기는 객지나 다름없습니다.\n박 첨지: 재산이 있으면 나눠 줄 마음이오?\n표 생원: 다시 이를 말씀이오?\n  (박 첨지가 한참 생각한다.)\n박 첨지: 내가 한 마을의 구장으로 잘 처리하겠으니 염려 마우. <창> 돌모리집은 왕십리에 구실 은(銀) 두 되하는 논 네 마지기를 주고, 꼭두각시는 남산 봉우제 재실 재답 구실 닷 마지기 고추밭 하루갈이 주고, 용산 삼개 들어오는 뗏목은 모두 다 묶어다가 돌모리집 가져가고, 꼭두각시 널랑은 명년(明年) 장마에 떠밀리는 나무뿌리는 너 다 갖고, 은장 봉장 자개 함롱 반닫이는 글낭 모두 돌모리집 주고, 뒤꼍에 돌아가 개똥밭 하루갈이와 매운 짓독 깨진 걸랑 꼭두각시 너 다 가져라.\n꼭두각시: <창> ㉣허허, 나는 가네. 나 돌아가네. 덜덜거리고 그 돌아가네. (춤추며 나간다.)\n(중략)\n\n[제7막] 평안 감사 재상(在喪) 거리\n  (평안 감사의 모친 상여가 나온다.)\n평안 감사: 꼴곡 꼴곡 꼴곡 꼴곡. ㉤아이고 좋아. 콩나물 안방 차지 내 차지.\n  (양산도 등 노래를 부른다.)\n작은 박 첨지: (구경하다가) 이게 뉘 놈의 상여냐? 초상 상주 놈의 소리가 앓는 곳이냐?\n  (그때 상두꾼이 발병이 나서 못 가고 상여를 내려놓았다.)\n평안 감사: 여봐라, 박가야. (박 첨지가 나온다.) 말 들어라. 상여가 나가다가 상두꾼이 발병이 났으니, 인부를 사 대라.\n박 첨지: 인부가 졸지에 없사오니 소인의 조카 놈이 궂은일 잘 보고, 괴덜머리쩍고, 기운이 역사요, 이상야릇한 놈이오니 그놈으로 천거하옵니다.\n평안 감사: 이놈 더디다. 빨리 대령하여라.\n박 첨지: 네─ (홍동지를 부른다.) 여봐라, 듼둥아! 이번에 감사 사또 연번시 상두꾼이 발탈이 났으니 하룻밤 삼시야 사시야 먹고, 돈 칠 푼 줄 것이니 상여꾼 품 팔러 안 가려느냐?\n홍동지: 왜 그래쌌소?\n박 첨지: 지금 한 말 못 들었느냐? 만일 지체하면 주릿대학춤, 고드래뼈 튕겨지면 호소할 곳 바이없으니 지체 말고 빨리 나오너라.\n홍동지: 아자씨 말씀이 정말이요? / 박 첨지: 그짓말하겠느냐?\n홍동지: 빨가벗어도 좋소? / 박 첨지: 관계없다.\n홍동지: 어디 가서 보기나 합시다. (홍동지가 가만히 가서 상제도 보고 또 상여를 냄새 맡더니) 카 ─ 이게 뭐요?\n박 첨지: 왜 그러느냐?\n홍동지: 아─ 오뉴월 강생이 썩는 냄새가 나는구려.\n박 첨지: 이놈아! 그게 무슨 말이냐? 감사또 아시면 서운치 않으시겠느냐?\n홍동지: 사또가 섭섭하시면 큰 개 썩는 냄새가 난다 합시다.\n평안 감사: 꼴곡 꼴곡 꼴곡. (왔다 갔다 한다.)\n홍동지: 상제님 문안드리오.\n평안 감사: 이놈! 상여도 대부인 상여인데, 문안이고 문밖이고 웬 놈이 빨가벗고 덤벙거리느냐?\n홍동지: 빨가벗었더라도 상여만 잘 메면 됐지. 무삼 잔말.\n평안 감사: 네가 상여를 모시러 왔다니 듣기는 반갑다마는 빨가벗고 무슨 상여를 멘단 말이냐? 괘씸한 놈 잡아내라. (평안 감사가 화를 내어 박 첨지를 잡아들여서 태장을 한다.)\n- 작자 미상, 「꼭두각시놀음」\n*신주: 죽은 사람의 영을 모신 위패. *상우례: 신랑이 처가의 친척과, 또는 신부가 시가의 친척과 처음 만나는 예식.\n*소실: 정식 아내 외에 데리고 사는 여자. *백계무책: 있는 꾀를 다 써도 소용이 없음.\n*재상: 어버이의 상중(喪中)에 있음. *꼴곡: 앓는 소리. *양산도: 경기 민요 선소리의 하나로 삼박자의 흥겨운 노래.\n*괴덜머리쩍고: 수선스럽고 실없는 짓을 하고. *연번시: 장사(葬事) 지내러 가는 길에 등을 들고 가는 것.\n*주릿대학춤, 고드래뼈 튕겨지면: 형벌을 받게 되면. *강생이: '강아지'의 방언. *대부인: 남의 어머니를 높여 이르는 말."

const uPsg  = {};    // {setId: {idx: string}} — user-pasted passages

SETS.forEach(s => {
  picks[s.id] = {};
  shown[s.id] = {};
  uPsg[s.id]  = {};
  workIdx[s.id] = 0;
});

// ─── score ───────────────────────────────────────────
function updateScore(){
  let total=0, correct=0;
  SETS.forEach(s=>{
    s.questions.forEach(q=>q.items.forEach(it=>{
      total++;
      const p=picks[s.id][it.tag];
      if(p && p===it.answer) correct++;
    }));
  });
  document.getElementById('scoreEl').textContent = correct+'/'+total;
}

  const s=SETS.find(x=>x.id===setId);
  if(uPsg[setId][wi]!==undefined) return uPsg[setId][wi];
  return (s.passages&&s.passages[wi]&&s.passages[wi].text)||'';
}

function startEdit(wi){
  const s=SETS[cur];
  editingW={setId:s.id, workIdx:wi};
  document.getElementById('editTA').value=psgText(s.id,wi);
  document.getElementById('ppBody').style.display='none';
  document.getElementById('editWrap').style.display='flex';
  document.getElementById('editTA').focus();
}

function cancelEdit(){
  editingW=null;
  document.getElementById('ppBody').style.display='';
  document.getElementById('editWrap').style.display='none';
}

function saveEdit(){
  if(!editingW) return;
  uPsg[editingW.setId][editingW.workIdx]=document.getElementById('editTA').value;
  editingW=null;
  document.getElementById('ppBody').style.display='';
  document.getElementById('editWrap').style.display='none';
  renderPassage();
}

// ─── passage render ──────────────────────────────────
function renderPassage(){
  const s=SETS[cur];
  document.getElementById('ppTitle').textContent=s.title;
  document.getElementById('ppSrc').textContent=s.source;

  const works=s.passages||[{label:s.title,text:''}];
  const tabsEl=document.getElementById('workTabsEl');
  tabsEl.innerHTML='';
  if(works.length>1){
    works.forEach((w,i)=>{
      const btn=document.createElement('button');
      btn.className='wtab'+(i===(workIdx[s.id]||0)?' active':'');
      btn.textContent=w.label.split('—')[0].trim().slice(0,14)||w.label.slice(0,14);
      btn.onclick=()=>{ workIdx[s.id]=i; cancelEdit(); renderPassage(); };
      tabsEl.appendChild(btn);
    });
  }

  const wi=workIdx[s.id]||0;
  const w=works[wi]||{label:'',text:''};
  const text=psgText(s.id,wi);
  const body=document.getElementById('ppBody');
  body.style.display='';
  document.getElementById('editWrap').style.display='none';

  if(!text.trim()){
    body.innerHTML=`<div class="p-empty">
      <strong>${w.label}</strong>
      <small>원문 지문을 입력하면 문제 옆에서 바로 참고할 수 있습니다.</small>
      <button class="paste-btn" onclick="startEdit(${wi})">✏ 지문 입력하기</button>
    </div>`;
  } else {
    body.innerHTML=`<div class="p-label">${w.label}</div>
      <div class="p-text">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <button class="paste-btn" style="margin-top:14px;" onclick="startEdit(${wi})">✏ 수정</button>`;
  }
}

// ─── set tabs ────────────────────────────────────────
function renderTabs(){
  const el=document.getElementById('tabsEl');
  el.innerHTML='';
  SETS.forEach((s,i)=>{
    const done=Object.keys(picks[s.id]).length;
    const btn=document.createElement('button');
    btn.className='stab'+(i===cur?' active':'')+(done>0?' in-progress':'');
    btn.innerHTML=`세트 ${i+1}. ${s.title}<span class="dot"></span>`;
    btn.onclick=()=>{ cur=i; cancelEdit(); workIdx[s.id]=workIdx[s.id]||0; renderAll(); document.getElementById('qpEl').scrollTop=0; };
    el.appendChild(btn);
  });
}

// ─── questions render ────────────────────────────────
function renderQuestions(){
  const s=SETS[cur];
  const qp=document.getElementById('qpEl');
  const sy=qp.scrollTop;
  const list=document.getElementById('qlist');
  list.innerHTML='';

  s.questions.forEach(q=>{
    const items=q.items.filter(it=>{
      if(filt==='orig') return it.tag.includes('원본');
      if(filt==='var')  return it.tag.includes('변형');
      return true;
    });
    if(!items.length) return;

    const block=document.createElement('div');
    block.className='qblock';

    const qhead=document.createElement('div');
    qhead.className='qhead';
    qhead.innerHTML=`<div class="qtext"><span class="qn">문항 ${q.num}.</span> ${q.desc}</div>
      <button class="reveal-q">전체 확인</button>`;
    qhead.querySelector('.reveal-q').onclick=()=>{
      items.forEach(it=>{ if(picks[s.id][it.tag]) shown[s.id][it.tag]=true; });
      renderQuestions();
    };
    block.appendChild(qhead);

    items.forEach(it=>block.appendChild(buildItem(s.id, it)));
    list.appendChild(block);
  });

  qp.scrollTop=sy;
}

function buildItem(setId, it){
  const isVar=it.tag.includes('변형');
  const picked=picks[setId][it.tag];
  const isShown=shown[setId][it.tag];

  const el=document.createElement('div');
  el.className='item';

  // Statement
  el.innerHTML=`<div class="i-top">
    <span class="tag ${isVar?'var':'orig'}">${it.tag}</span>
    <span class="stmt">${it.text}</span>
  </div>`;

  // O/X buttons
  const oxrow=document.createElement('div');
  oxrow.className='oxrow';
  ['O','X'].forEach(v=>{
    const btn=document.createElement('button');
    btn.className='oxbtn'+(picked===v?' pick-'+(v==='O'?'o':'x'):'')+(picked?' locked':'');
    btn.textContent=v;
    btn.onclick=()=>{
      if(picks[setId][it.tag]) return;
      picks[setId][it.tag]=v;
      renderTabs(); updateScore(); renderQuestions();
    };
    oxrow.appendChild(btn);
  });
  el.appendChild(oxrow);

  // Toggle button for answer/explanation (only after picking)
  if(picked){
    const tog=document.createElement('button');
    tog.className='a-toggle vis';
    tog.textContent=isShown?'정답·해설 닫기':'▼ 정답 및 해설 확인';
    tog.onclick=()=>{
      shown[setId][it.tag]=!shown[setId][it.tag];
      renderQuestions();
    };
    el.appendChild(tog);

    // Answer/explanation box (only when shown)
    if(isShown){
      const correct=picked===it.answer;
      const box=document.createElement('div');
      box.className='a-box vis '+(correct?'ok':'ng');
      box.innerHTML=`
        <div class="a-verdict ${correct?'ok':'ng'}">${correct?'✓ 정답':'✗ 오답'}</div>
        <div class="a-ans">정답: ${it.answer}</div>
        <div class="a-exp"><b>해설</b> ${it.explain}</div>`;
      el.appendChild(box);
    }
  }

  return el;
}

// ─── filters & reset ─────────────────────────────────
document.getElementById('chipsEl').addEventListener('click', e=>{
  const btn=e.target.closest('.chip');
  if(!btn) return;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  filt=btn.dataset.f;
  renderQuestions();
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  const s=SETS[cur];
  if(!confirm(`'${s.title}' 세트 답안을 모두 초기화할까요?`)) return;
  picks[s.id]={};
  shown[s.id]={};
  renderAll();
});

// ─── main render ─────────────────────────────────────
function renderAll(){
  renderTabs();
  renderPassage();
  renderQuestions();
  updateScore();
}

renderAll();
</script>
</body>
</html>
