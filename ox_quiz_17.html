<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>문학 O/X 퀴즈 — 대영고 2학년 1학기 기말</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#f5f4f0;color:#1a1a18;font-size:15px;line-height:1.7;min-height:100vh}
.wrap{max-width:760px;margin:0 auto;padding:1.5rem 1rem 4rem}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.hdr-title h1{font-size:20px;font-weight:700}
.hdr-title p{font-size:12px;color:#888;margin-top:2px}
.stats{display:flex;gap:8px}
.stat{background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 14px;text-align:center}
.stat-n{font-size:18px;font-weight:700;color:#2563eb}
.stat-l{font-size:11px;color:#888}
.work-nav{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.w-btn{padding:5px 11px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;font-size:12px;cursor:pointer;transition:all .12s;line-height:1.3}
.w-btn:hover{border-color:#93c5fd;color:#2563eb}
.w-btn.active{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;font-weight:600}
.w-btn.done{background:#dcfce7;border-color:#86efac;color:#15803d}
.tab-row{display:flex;gap:6px;margin-bottom:1rem}
.tab-btn{padding:7px 18px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;font-size:13px;cursor:pointer;transition:all .12s}
.tab-btn.active{background:#2563eb;border-color:#2563eb;color:#fff;font-weight:600}
.factor-tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;background:#ede9fe;color:#6d28d9;margin-bottom:5px}
.q-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;padding:1rem;margin-bottom:8px}
.q-top{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px}
.q-num{min-width:27px;height:27px;border-radius:50%;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-text{font-size:14px;color:#1a1a18;line-height:1.65}
.ox-row{display:flex;gap:8px}
.ox-btn{flex:1;padding:9px;border:1px solid #ccc;border-radius:8px;background:#f9f9f7;font-size:15px;font-weight:700;cursor:pointer;color:#555;transition:all .12s}
.ox-btn:hover{border-color:#999;background:#f0f0ee}
.ox-btn.sel-o{background:#d1fae5;border-color:#34d399;color:#065f46}
.ox-btn.sel-x{background:#fee2e2;border-color:#f87171;color:#991b1b}
.ox-btn.right{background:#bbf7d0;border-color:#16a34a;color:#14532d}
.ox-btn.wrong{background:#fecaca;border-color:#dc2626;color:#7f1d1d}
.result{display:none;margin-top:8px;padding:8px 10px;border-radius:8px;font-size:13px;line-height:1.55}
.result.show{display:block}
.result.ok{background:#f0fdf4;color:#166534;border:1px solid #86efac}
.result.fail{background:#fff1f2;color:#9f1239;border:1px solid #fca5a5}
.score-box{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1.25rem;text-align:center;margin-bottom:1rem}
.score-big{font-size:42px;font-weight:700;color:#2563eb}
.score-sub{font-size:13px;color:#666;margin-top:4px}
.progress{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.dot{width:11px;height:11px;border-radius:50%;background:#d1d5db}
.dot.ans{background:#93c5fd}
.dot.ok{background:#4ade80}
.dot.ng{background:#f87171}
.check-btn{width:100%;padding:11px;border:none;border-radius:8px;background:#2563eb;color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit}
.check-btn:hover{background:#1d4ed8}
.reset-btn{width:100%;padding:11px;border:1px solid #2563eb;border-radius:8px;background:#dbeafe;color:#1d4ed8;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;font-family:inherit}
.ans-sum{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0 12px}
.ans-pill{padding:3px 11px;border-radius:20px;font-size:12px;font-weight:700}
.ans-pill.o{background:#d1fae5;color:#065f46}
.ans-pill.x{background:#fee2e2;color:#991b1b}
.ans-card{background:#fff;border:1px solid #e5e5e3;border-radius:12px;margin-bottom:6px;overflow:hidden}
.ans-q-row{display:flex;gap:10px;align-items:flex-start;padding:.75rem 1rem;background:#f9f9f7}
.ans-e-row{padding:.65rem 1rem;font-size:13px;color:#1a1a18;line-height:1.65}
.ans-badge{padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.work-hdr{font-size:15px;font-weight:700;color:#1a1a18;margin-bottom:4px;padding-bottom:7px;border-bottom:1px solid #e5e5e3}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-top:.85rem}
.sc-item{background:#fff;border:1px solid #e5e5e3;border-radius:8px;padding:7px 10px}
.sc-name{font-size:11px;color:#666;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-val{font-size:14px;font-weight:700;color:#1a1a18}
.overall{background:#fff;border:1px solid #ddd;border-radius:12px;padding:1rem;margin-bottom:1rem}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="hdr-title">
    <h1>문학 O/X 퀴즈</h1>
    <p>대영고 2학년 1학기 기말 대비 · 17작품 × 10문항 = 170문항</p>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="st-a">0</div><div class="stat-l">답변</div></div>
    <div class="stat"><div class="stat-n" id="st-o">-</div><div class="stat-l">정답</div></div>
    <div class="stat"><div class="stat-n">170</div><div class="stat-l">전체</div></div>
  </div>
</div>
<div class="work-nav" id="wnav"></div>
<div class="tab-row">
  <button class="tab-btn active" onclick="showTab('q')">문항 풀기</button>
  <button class="tab-btn" onclick="showTab('a')">정답 · 해설</button>
  <button class="tab-btn" onclick="showTab('s')">전체 성적</button>
</div>
<div id="q-area"></div>
<div id="a-area" style="display:none"></div>
<div id="s-area" style="display:none"></div>
</div>
<script>

const D=[
{t:"쉽게 씌어진 시 (윤동주)",f:["시어·구절의 의미","표현 방식·기법","화자의 태도와 정서"],q:[
{f:0,q:"'육첩방은 남의 나라'는 화자가 처한 낯선 타국의 현실을 상징하며 화자를 구속하는 폐쇄적 공간을 나타낸다.",a:"O",e:"육첩방은 낯선 타국 현실을 인식하게 하는 공간이자 화자를 구속하는 폐쇄적 공간이다. '남의 나라'에서 이방인의 소외감이 드러난다."},
{f:0,q:"'홀로 침전하는 것일까'의 '침전'은 무기력한 삶에 대한 회의와 하강적 이미지를 통한 성찰을 드러낸다.",a:"O",e:"'침전(沈澱)'은 가라앉는다는 의미로, 무기력하게 가라앉는 삶에 대한 자괴감과 성찰을 하강적 이미지로 표현한 것이다."},
{f:0,q:"'늙은 교수의 강의'는 시대 현실과 호응하는 진취적인 지식을 상징한다.",a:"X",e:"'늙은 교수의 강의'는 일제 강점기라는 시대 현실과 동떨어진 무기력하고 괴리된 지식을 암시한다."},
{f:0,q:"'최초의 악수'는 분열된 두 자아가 화해하여 내적 분열을 극복하려는 태도를 나타낸다.",a:"O",e:"성찰적 자아와 현실적 자아가 화해하며 내적 분열을 극복하려는 태도가 드러난다."},
{f:1,q:"'육첩방은 남의 나라'가 시의 처음과 끝에 반복되어 수미상관 구조를 이루고 있다.",a:"O",e:"1연과 후반부에 반복되어 수미상관 구조를 형성하며, 이방인으로서의 소외감을 강조한다."},
{f:1,q:"이 시는 영탄적 어조를 반복하여 화자의 굳은 의지를 부각하는 방식으로 시상을 전개한다.",a:"X",e:"이 시의 주조는 영탄보다 자기 성찰적 어조다. '부끄러운 일이다'처럼 자아를 반성하고 내면을 성찰하는 방식이 핵심이다."},
{f:1,q:"'등불을 밝혀 어둠을 조금 내몰고'는 현실의 어둠에 맞서 희망을 지키려는 화자의 의지를 드러낸다.",a:"O",e:"어둠(현실의 억압)을 등불로 조금이나마 내모는 행위는, 작은 희망과 의지를 놓지 않으려는 화자의 태도를 형상화한다."},
{f:2,q:"이 시의 화자는 식민지 현실 속에서 시를 쉽게 쓰는 자신을 부끄러워하며 자기 성찰을 수행한다.",a:"O",e:"'시가 이렇게 쉽게 씌어지는 것은 / 부끄러운 일이다'에서 시대의 고통과 유리된 안이한 삶에 대한 부끄러움과 자기 성찰이 관통한다."},
{f:2,q:"'땀내와 사랑내 포근히 품긴 학비 봉투'는 가족의 희생과 사랑을 환기하여 화자의 죄책감을 심화한다.",a:"O",e:"부모가 보내준 학비 봉투에 배어 있는 땀과 사랑의 냄새는 가족의 희생을 상기시켜 화자의 죄책감과 부끄러움을 심화한다."},
{f:2,q:"'시대처럼 올 아침'의 '아침'은 화자가 체념하고 받아들이는 현재 상황을 의미한다.",a:"X",e:"'아침'은 체념이 아니라 화자가 능동적으로 기다리는 희망적 미래를 의미한다. 억압적 현실이 끝나고 도래할 밝은 미래를 상징한다."}
]},
{t:"교목 (이육사)",f:["시어·구절의 의미","표현 방식·기법","화자의 태도와 주제"],q:[
{f:0,q:"'세월에 불타고 우뚝 남아 서서'는 극심한 시련 속에서도 굴복하지 않는 저항 의지를 형상화한다.",a:"O",e:"세월(시련)에 불타면서도 '우뚝 남아 서는' 교목의 모습은 가혹한 현실 속에서도 타협하지 않고 굳건히 서는 저항 의지를 상징한다."},
{f:0,q:"'차라리 봄도 꽃피진 말아라'는 암울한 현실이 계속되기를 바라는 화자의 수용적 태도를 드러낸다.",a:"X",e:"현실에 안주하거나 개인의 영달을 추구하지 않겠다는 단호한 결의를 표현한다. 생명력이 없는 극한 상황을 스스로 설정해 저항 의지를 강조한 것이다."},
{f:0,q:"'호수 속 깊이 거꾸러져 / 차마 바람도 흔들진 못해라'는 외부 폭력에도 흔들리지 않겠다는 의지를 나타낸다.",a:"O",e:"호수 속 깊이 거꾸러질지언정 바람(외부의 폭력)에 흔들리지 않겠다는 부정 명령형은 어떤 위협에도 굴복하지 않겠다는 단호한 저항 의지의 표현이다."},
{f:0,q:"'마음은 아예 뉘우침 아니라'는 저항적 삶의 길에 대해 어떤 후회도 갖지 않겠다는 결의를 보여준다.",a:"O",e:"이상을 향한 저항적 삶의 길에 대해 결코 후회하지 않겠다는 단호한 결의가 이 구절에 담겨 있다."},
{f:1,q:"'~말아라', '~못해라' 등 부정 명령형 어미를 반복하여 화자의 단호한 의지를 부각한다.",a:"O",e:"'꽃피진 말아라', '흔들진 못해라'처럼 부정 명령형 어미의 반복이 저항 의지와 단호함을 강조한다."},
{f:1,q:"이 시는 '교목'에 화자의 정신을 투영하는 은유 방식을 사용한다.",a:"O",e:"교목(喬木)은 화자 자신의 저항 의지와 굳은 정신을 투영한 상관물이다. '~처럼'이 아닌 은유 방식으로 교목과 화자가 동일시된다."},
{f:1,q:"이 시는 '~처럼/같이'의 직유를 거듭하여 교목이 지닌 굳센 속성을 부각한다.",a:"X",e:"이 시는 교목에 화자의 의지를 투영하는 은유를 사용하지, '~처럼/같이'의 직유를 반복하는 방식을 쓰지 않는다."},
{f:2,q:"이 시의 주제는 극심한 시련 속에서도 굴복하지 않으려는 저항 의지이다.",a:"O",e:"교목을 통해 형상화된 이 시의 핵심 주제는 일제 강점기라는 극한 상황 속에서도 타협하지 않고 저항 의지를 지키려는 정신이다."},
{f:2,q:"이 시에서 '낡은 거미집'은 화자가 지향하는 이상향을 의미한다.",a:"X",e:"'낡은 거미집'은 이상향이 아니라 생명력을 상실한 극한 상황, 가혹한 현실의 상징이다."},
{f:2,q:"이 시의 화자와 「쉽게 씌어진 시」의 화자는 모두 절망적 상황 속에서도 내면의 의지를 다지며 부정적 현실에 굴하지 않으려 한다.",a:"O",e:"윤동주의 시는 '등불을 밝혀 최후의 나'를, 이육사의 시는 부정 명령형으로 저항 의지를 드러낸다. 두 화자 모두 부정적 현실에 굴하지 않으려는 공통된 태도를 보인다."}
]},
{t:"꽃 (김춘수)",f:["시어·구절의 의미","표현 방식·기법","작품의 주제와 구조"],q:[
{f:0,q:"1연의 '몸짓'은 아직 이름이 불리지 않아 의미를 부여받지 못한 무의미한 존재를 가리킨다.",a:"O",e:"명명 행위 이전의 '그'는 '하나의 몸짓에 지나지 않았다'고 했다. 의미를 부여받기 이전의 무의미한 상태다."},
{f:0,q:"2연의 '꽃'은 실제 자연 속 꽃의 아름다움을 예찬하기 위한 심미적 대상이다.",a:"X",e:"'꽃'은 실재하는 꽃이 아니라 이름을 불러줌으로써 의미를 부여받은 '의미 있는 존재'를 상징하는 관념적 시어다."},
{f:0,q:"3연의 '빛깔과 향기'는 '나'라는 존재가 지닌 고유한 본질과 참된 가치를 비유적으로 나타낸다.",a:"O",e:"'나의 이 빛깔과 향기에 알맞은'이라는 구절에서 '빛깔과 향기'는 화자 자신이 지닌 고유한 존재의 본질을 비유한 표현이다."},
{f:0,q:"'누가 나의 이름을 불러다오'는 잃어버린 과거를 그리워하는 회상적 표현이다.",a:"X",e:"이 구절은 과거 회상이 아니라 자신도 누군가에게 의미 있는 존재로 인식되기를 바라는 미래 지향적·소망적 표현이다."},
{f:1,q:"이 시는 '나 → 너 → 우리'로 인식의 주체가 점층적으로 확대되는 구조를 취한다.",a:"O",e:"1·2연(나→그), 3연(나에 대한 소망), 4연(우리들은 모두)으로 인식의 범위가 점층적으로 넓어진다."},
{f:1,q:"'~다' 종결어미를 반복 사용하여 소망을 강조하고 각운을 형성한다.",a:"O",e:"'지나지 않았다', '꽃이 되었다', '되고 싶다' 등 '~다' 종결을 반복해 각운을 형성하고 소망의 어조를 강조한다."},
{f:1,q:"이 시는 관념적 내용을 추상적인 방식으로 전달하는 주정적(主情的) 시이다.",a:"X",e:"이 시는 '꽃'이라는 구체적 사물을 통해 추상적·관념적 의미를 전달하는 주지적(主知的) 시다. 감정을 직접 토로하는 주정적 시가 아니다."},
{f:2,q:"4연의 '눈짓'은 '몸짓'과 마찬가지로 무의미한 존재를 가리키는 시어이다.",a:"X",e:"'눈짓'은 '몸짓'(무의미한 존재)과 대립하며 '꽃'과 동격의 시어로, '서로에게 잊혀지지 않는 의미 있는 존재'를 뜻한다."},
{f:2,q:"이 시의 핵심 주제는 존재의 본질 구현과 상호 주체적인 진정한 관계 형성에 대한 소망이다.",a:"O",e:"'이름 불러주기'는 존재에 의미를 부여하는 행위이며, 3·4연에서 상호 주체적 관계에 대한 소망이 주제다."},
{f:2,q:"이 시는 처음부터 끝까지 화자가 일방적으로 다른 존재에게 의미를 부여하는 구도로 전개된다.",a:"X",e:"3연에서 화자 자신도 '누가 나의 이름을 불러다오'라며 타인의 인식을 갈망한다. 상호적 관계를 지향하는 구도다."}
]},
{t:"라디오와 같이 사랑도 끄고 켤 수 있다면 (장정일)",f:["원작과의 비교·패러디 관계","시어·구절의 의미","화자의 태도와 주제"],q:[
{f:0,q:"이 시는 김춘수의 「꽃」을 패러디하여 원작의 형식을 빌리되 주제를 전복하는 작품이다.",a:"O",e:"「꽃」의 통사 구조를 그대로 가져오면서 진정한 관계 소망(꽃)을 가볍고 편의적인 현대인의 사랑(라디오)으로 비틀어 풍자한 패러디 시다."},
{f:0,q:"「꽃」의 '이름 불러주기'와 이 시의 '단추 눌러주기'는 의미가 동일한 행위이다.",a:"X",e:"'이름 불러주기'는 인격적·진정한 관계를, '단추 눌러주기'는 편의에 따라 관계를 맺고 끊으려는 태도를 나타낸다. 의미가 대조된다."},
{f:0,q:"「꽃」의 '꽃'에 대응하는 이 시의 시어는 '전파'이다.",a:"O",e:"「꽃」에서 '몸짓 → 꽃'으로 변화하듯, 이 시에서는 '라디오 → 전파'로 변화한다. '전파'는 「꽃」의 '꽃'에 대응한다."},
{f:1,q:"'굳어버린 핏줄기와 황량한 가슴속'은 자연의 황폐함을 묘사하여 환경 문제를 고발하는 표현이다.",a:"X",e:"이 표현은 자연 묘사가 아니라 메마르고 고독한 현대인의 내면 심리를 비유한 것이다."},
{f:1,q:"4연의 '끄고 싶을 때 끄고 켜고 싶을 때 켤 수 있는 라디오'는 현대인의 이기적·편의적 사랑 방식을 반어적으로 비판한 표현이다.",a:"O",e:"라디오를 켜고 끄듯 관계를 맺고 끊으려는 태도는 진지하고 책임 있는 관계를 회피하는 현대인의 편의적 사랑을 반어적으로 풍자한다."},
{f:1,q:"이 시는 「꽃」처럼 '나 → 그 → 우리'로 인식의 주체가 확대되는 구조를 따른다.",a:"O",e:"「꽃」처럼 1·2연(나·그), 3연(나), 4연(우리들)로 확대되는 구조를 동일하게 차용한다. 형식은 같지만 내용은 정반대로 비틀린다."},
{f:2,q:"이 시의 화자는 타인과의 진정한 소통을 거부하고 고립되기를 원한다.",a:"X",e:"3연에서 '나의 버튼을 눌러다오'라고 절실히 바라는 데서, 화자는 오히려 소통과 사랑을 간절히 원하는 메마르고 상처받은 주체임을 알 수 있다."},
{f:2,q:"이 시는 「꽃」과 달리 가볍고 일회적인 현대인의 관계를 비판하는 주제를 담고 있다.",a:"O",e:"「꽃」이 진정한 관계 형성을 소망하는 반면, 이 시는 편의적이고 일회적인 현대인의 사랑 방식을 반어·풍자를 통해 비판한다."},
{f:2,q:"화자는 끄고 켤 수 있는 사랑을 이상적인 것으로 진심으로 예찬하고 있다.",a:"X",e:"이는 반어적 풍자 표현이다. '라디오가 되고 싶다'는 것은 가벼운 사랑 방식에 대한 비판이지, 진심 어린 예찬이 아니다."},
{f:0,q:"이 시는 추상적 관념(사랑)을 구체적 사물(라디오)로 형상화하는 방법을 사용한다.",a:"O",e:"'사랑'이라는 추상적 관념을 '라디오'라는 구체적 사물에 빗대어 형상화한다. 추상을 구체로 전환하는 기법이 핵심이다."}
]},
{t:"우리 동네 구자명 씨 (고정희)",f:["시어·구절의 의미","표현 방식·기법","화자의 시선과 주제"],q:[
{f:0,q:"'부처님처럼 졸고 있는' 모습은 구자명 씨가 마음의 평안을 얻어 달관한 상태를 나타낸다.",a:"X",e:"이는 반어적 표현이다. 고단함에 겨워 무방비로 쓰러진 모습을 부처님에 빗댄 것으로, 달관이나 평온이 아니다."},
{f:0,q:"'죽음의 잠을 향하여 거부의 화살을 당기고 있다'는 여성의 희생을 강요하는 현실에 대한 비판 의식을 담고 있다.",a:"O",e:"'죽음의 잠'은 삶을 갉아먹는 고단함을, '거부의 화살'은 그것에 맞서는 의지와 현실 비판을 은유한다."},
{f:0,q:"'안개꽃 멍에', '팬지꽃 아픔'은 구자명 씨의 아름다운 외모를 칭찬한 표현이다.",a:"X",e:"겉은 곱지만 속으로 고단함과 희생을 짊어진 여성의 삶을 형상화한 것이지, 외모 칭찬이 아니다."},
{f:1,q:"'저 십 분은 ~ 일 거야'라는 말투에서 화자가 구자명 씨에게 직접 들어 확인한 사실임을 알 수 있다.",a:"X",e:"'~일 거야'는 추측·상상의 말투다. 화자는 졸고 있는 구자명 씨를 바라보며 간밤의 일을 상상으로 짚어낸 것이다."},
{f:1,q:"'꼭'은 행간 걸림 기법으로, '계절에 상관없이 늘'과 '깨지도 않고 깊이'의 두 가지 의미로 읽히게 하는 효과를 준다.",a:"O",e:"'진달래 피고 밤꽃 흐드러져도 꼭 / 부처님처럼 졸고 있는'에서 '꼭'은 행간 걸림으로 두 가지 의미가 동시에 살아난다."},
{f:1,q:"비슷한 문장 구조('저 십 분은~')를 반복하여 리듬을 만들고 구자명 씨의 고단함을 구체적으로 쌓아간다.",a:"O",e:"반복 구조가 리듬을 형성하고, 간밤의 여러 가사·돌봄 노동을 하나씩 더해가며 고단함을 구체적으로 형상화한다."},
{f:2,q:"화자는 구자명 씨 개인의 모습에서 출발해 '지붕마다·여자'로 시상을 확대하며 사회 전체의 문제로 나아간다.",a:"O",e:"시 후반부에서 '부엌문이 여닫히는 지붕마다 / 여자'로 확대되면서, 개인의 이야기가 그 시대 모든 여성의 문제로 보편화된다."},
{f:2,q:"이 시의 화자는 구자명 씨를 직접 체험한 당사자로서 자신의 고단함을 고백하는 방식으로 시상을 전개한다.",a:"X",e:"화자는 출근 버스에서 구자명 씨를 바라보는 관찰자다. 연민의 시선으로 대상을 바라보는 관찰자가 화자다."},
{f:2,q:"'경기도 안산에서 서울 여의도까지'의 긴 거리는 가정과 직장이라는 이중의 책임을 상징한다.",a:"O",e:"먼 통근 거리는 집안일(가정)과 직장 일 양쪽을 모두 떠안아야 하는 맞벌이 여성의 이중 노동과 책임을 상징한다."},
{f:0,q:"화자는 구자명 씨의 모습을 효부이자 현모양처로 칭찬하려는 의도에서 시를 쓴다.",a:"X",e:"칭찬이 목적이 아니라 여성에게 일방적으로 희생이 강요되는 현실을 드러내고 비판하기 위한 시다."}
]},
{t:"납작납작 ─ 박수근 화법을 위하여 (김혜순)",f:["시어·구절의 의미","표현 방식·기법","작품의 주제와 맥락"],q:[
{f:0,q:"'벽 위에 납작하게 뻗어 있다'는 고달픈 현실에 짓눌려 사는 서민의 모습을 형상화한 것이다.",a:"O",e:"박수근의 평면적 화법을 빌려 현실에 짓눌려 납작해진 서민의 모습을 시각적으로 형상화한다. '납작하다'는 억눌린 삶의 은유다."},
{f:0,q:"'피도 눈물도 없이 바짝 마르기'는 감정조차 느낄 여유 없이 메말라 가는 서민의 각박한 삶을 나타낸다.",a:"O",e:"감정마저 잃어가며 바싹 말라가는 모습은 인간적 여유와 감수성을 잃어버린 서민의 각박한 삶을 표현한 것이다."},
{f:0,q:"'가이없이 한없이 펄렁펄렁'은 서민들이 억압에서 벗어나 자유를 누리는 해방감을 나타낸다.",a:"X",e:"제 뜻과 상관없이 세파에 끝없이 흔들리는 서민의 나약하고 무력한 처지를 나타낸다. 해방감이 아니다."},
{f:1,q:"'하나님 보시기 어떻습니까?'는 답이 정해진 설의적 표현으로 부조리한 현실에 대한 조용한 항변을 담고 있다.",a:"O",e:"'마땅합니까?'는 '마땅하지 않다'는 뜻을 절대자에게 묻는 형식으로 강하게 드러내는 설의법으로 현실에 대한 항변이다."},
{f:1,q:"경쾌한 음성 상징어의 어감과 짓눌린 내용 사이의 괴리가 반어적 효과를 자아낸다.",a:"O",e:"경쾌하고 가벼운 의태어(납작납작, 서성서성, 펄렁펄렁)와 짓눌린 내용 사이의 대비가 반어적 효과를 만들어낸다."},
{f:1,q:"이 시는 여러 차례 명령형 진술을 동원하여 짓눌린 현실을 바꾸도록 독자에게 촉구한다.",a:"X",e:"이 시는 '바라본다', '물어본다' 등 평서·의문의 진술을 중심으로 전개되며 명령형으로 현실 변화를 촉구하는 부분은 없다."},
{f:2,q:"이 시는 화가 박수근의 그림 〈세 여인〉을 바탕으로 그의 평면적 화법을 시로 변용한 작품이다.",a:"O",e:"'한 며칠 눌렀다가', '납작하게 뻗어 있다' 등에서 박수근의 원근법 없는 평면적 화법을 시적으로 변용하여 서민의 삶을 형상화한다."},
{f:2,q:"이 시의 화자는 '그림 그리는 사람(화가)'으로 설정되어 자기 그림에 대해 절대자에게 묻는 형식을 취한다.",a:"O",e:"화자는 세상을 눌러 납작하게 만드는 그림 그리는 행위를 하며 하나님께 묻는 형식으로 시가 전개된다."},
{f:2,q:"이 시에서 '드문드문 세상을 끊어 내어 / 한 며칠 눌렀다가'는 박수근의 평면적 그림 기법을 묘사한 것이다.",a:"O",e:"박수근은 원근법 없이 대상을 평면으로 압축하여 그렸다. 이 구절은 그 기법을 시로 옮긴 것으로 납작하게 만드는 과정을 묘사한다."},
{f:0,q:"'쭈그린 아낙네 둘'은 부유하고 여유로운 사람들을 그려낸 표현이다.",a:"X",e:"'쭈그린'은 웅크리고 힘겨운 자세를 나타낸다. 박수근이 즐겨 그린 가난하고 고달프게 살아가는 서민들의 모습이다."}
]},
{t:"못 위의 잠 (나희덕)",f:["시어·구절의 의미","표현 방식·기법","화자의 태도와 주제"],q:[
{f:0,q:"'못 하나'는 아비 제비가 밤을 지낼 수 있게 해준 자리로 아버지의 고달프고 위태로운 삶을 상징한다.",a:"O",e:"둥지를 식구에게 내주고 못 위에서 위태롭게 밤을 보내는 아비 제비의 모습이 실직한 아버지의 삶과 겹쳐진다."},
{f:0,q:"'반쪽 난 달빛은 또 얼마나 창백했던가요'는 지친 어머니의 창백한 얼굴을 달빛에 빗댄 시각적 표현이다.",a:"O",e:"피곤에 지친 어머니가 버스에서 내리는 장면에서 어머니의 창백한 얼굴을 달빛과 겹쳐 시각적으로 형상화한 표현이다."},
{f:0,q:"'때 묻은 호두알은 쉽게 깨어지지 않고'는 아버지가 소중히 아끼던 값진 보물을 나타낸다.",a:"X",e:"손때가 묻을 만큼 오래 만지작거린 것으로 아버지의 실업이 쉽게 해결되지 않고 오래 이어졌음을 빗댄 표현이다."},
{f:1,q:"이 시는 못 위의 아비 제비와 실직했던 아버지를 겹쳐 보는 '병치(오버랩)' 기법을 사용한다.",a:"O",e:"둥지 밖 못 위에서 자는 아비 제비의 모습과 못 위에서 견디듯 살아온 아버지의 삶을 겹쳐 보여주는 병치 기법이 이 시의 핵심 구성 원리다."},
{f:1,q:"이 시는 '현재 → 과거 → 현재'의 순서로 시간을 오가며 회상적으로 전개된다.",a:"O",e:"현재 아비 제비를 바라보다가 어린 시절 아버지와의 과거를 회상하고 다시 현재의 '못 하나, 그 위의 잠'으로 돌아오는 현재-과거-현재 구조다."},
{f:1,q:"'못 하나, 그 위의 잠'이라는 명사 종결은 여운을 남기며 아버지의 고단한 삶을 깊이 새기는 효과를 준다.",a:"O",e:"시의 마지막을 명사(구)로 끝맺음으로써 독자에게 깊은 여운을 남긴다."},
{f:2,q:"이 시의 화자는 아비 제비와 아버지를 관찰자의 시선으로 바라보며 연민을 담아 형상화한다.",a:"O",e:"화자는 아비 제비를 '눈이 뜨겁도록 올려다보'며 연민을 느끼고 어린 시절 아버지를 회상하는 관찰자적 위치를 취한다."},
{f:2,q:"'늘 한 걸음 늦게 따라오던 아버지의 그림자'에는 아버지의 미안함과 가족을 향한 배려가 담겨 있다.",a:"O",e:"실직으로 가족에게 충분히 해주지 못했다는 미안함과 식구들을 앞세우고 뒤에서 따라오는 배려가 담겨 있다."},
{f:2,q:"'흙바람'은 가족에게 찾아온 포근하고 따뜻한 분위기를 만드는 소재이다.",a:"X",e:"'흙바람'은 포근함이 아니라 거칠고 척박한 현실, 가족에게 닥친 시련과 어려움을 나타내는 소재다."},
{f:0,q:"'눈이 뜨겁도록 올려다봅니다'에서 아비 제비를 향한 화자의 깊은 연민이 느껴진다.",a:"O",e:"눈시울이 뜨거워질 만큼 깊은 연민이 차오름을 나타내며 이 감정은 아비 제비를 통해 아버지를 떠올리게 되는 신호이기도 하다."}
]},
{t:"뿌리에게 (나희덕)",f:["시어·구절의 의미","표현 방식·기법","화자의 태도와 주제"],q:[
{f:0,q:"이 시에서 '나(흙)'는 '너(뿌리)'에게 말을 건네는 구조이며 흙은 자식을 위해 자신을 내어주는 어머니 같은 존재를 상징한다.",a:"O",e:"화자 '나' = 흙, 청자 '너' = 뿌리이며 흙이 뿌리에게 영양분(밝은 피)을 내어주는 모습은 자식을 위해 희생하는 어머니의 사랑을 형상화한다."},
{f:0,q:"'단단해지는 나의 살을 보아라'는 흙이 점점 강하고 풍요로워졌음을 자랑하는 표현이다.",a:"X",e:"뿌리가 자랄수록 흙은 영양분을 빼앗겨 거칠고 단단하게 굳어간다. 다 내어준 희생의 결과를 나타내는 것이지 강해짐을 자랑하는 것이 아니다."},
{f:0,q:"'마지막 잔을 마셔다오'는 흙이 뿌리에게서 마지막으로 보상을 돌려받으려는 표현이다.",a:"X",e:"보상을 받으려는 것이 아니라 마지막 남은 것까지 내어주려는 흙의 극한적 희생 의지를 나타내는 표현이다."},
{f:1,q:"'어리석고도 은밀한 기쁨'은 역설적 표현으로 희생이 겉으론 어리석어 보이지만 그 안에 깊은 기쁨이 있음을 나타낸다.",a:"O",e:"자신을 내어주는 것은 겉보기엔 어리석어 보이지만 생명을 키우는 은밀한 기쁨이 있다는 역설(모순어법)이다."},
{f:1,q:"이 시는 처음과 끝에 유사한 구절을 배치하여 순환적 구조와 안정감을 준다.",a:"O",e:"1연 첫 행과 5연 첫 행에 '깊은 곳에서 네가 나의 뿌리였을 때'가 반복되어 수미상관의 구조를 이루며 생명의 순환을 구조적으로 강조한다."},
{f:1,q:"청자에게 말을 건네는 방식('나를 뚫고 오르렴', '뻗어가려무나')으로 화자의 정서를 친밀하게 전달한다.",a:"O",e:"'~렴', '~려무나', '~마셔다오' 등 청자에게 직접 말을 건네는 친근한 어조로 흙이 뿌리를 향해 갖는 사랑과 친밀감을 생생하게 전달한다."},
{f:2,q:"이 시의 마지막 연에서 '연한 흙으로 일구어지고 있을 테니'는 흙의 완전한 소멸을 의미하며 시를 비극적으로 끝맺는다.",a:"X",e:"다시 '연한 흙'으로 돌아가는 것은 소멸이 아니라 재생과 순환이다. 사랑의 순환 구조를 긍정적으로 마무리한다."},
{f:2,q:"이 시는 생명의 탄생과 성장을 위해 자신을 희생하는 어머니 같은 사랑과 생명의 순환을 주제로 한다.",a:"O",e:"흙이 뿌리에게 모든 것을 내어주고 빈 그릇이 되지만 다시 연한 흙으로 순환된다. 자기희생적 사랑이 다음 세대로 흘러가는 순환이 주제다."},
{f:2,q:"'내 가슴에 끓어오르던 벌레들'은 흙이 뿌리에 대한 미련을 떨치려는 망설임을 표현한 것이다.",a:"X",e:"과거 온갖 생명이 깃들어 풍요로웠던 흙의 생명력 넘치는 상태를 나타낸다. 망설임이 아니라 과거의 풍요와 현재의 '빈 그릇'을 대조시키는 표현이다."},
{f:0,q:"'밝은 피'는 흙이 뿌리에게 내어주는 물·영양분을 빗댄 말로 자신을 내어주는 사랑을 감각적으로 형상화한 것이다.",a:"O",e:"흙이 뿌리에게 공급하는 영양분을 혈액에 빗대어 자신을 내어주는 희생적 사랑을 감각적으로 형상화한 시어다."}
]},
{t:"대설주의보 (최승호)",f:["시어·상징의 의미","표현 방식·기법","작품의 주제"],q:[
{f:0,q:"'백색의 계엄령'은 온 천지를 짓누르는 위압적 상황을 시각적으로 형상화한 표현이다.",a:"O",e:"군사 용어인 '계엄령'을 눈보라에 빌려 씀으로써 폭력적이고 위압적인 힘이 온 세상을 짓누르는 상황을 선명하게 형상화한다."},
{f:0,q:"'굴뚝새'는 눈보라라는 거대한 폭력 앞에 쉽게 굴복하여 사라지는 나약한 존재를 상징한다.",a:"X",e:"굴뚝새는 눈보라 속을 날아 '뒷간에 몸을 감'추며 위협을 견디는 약한 생명이지 폭력에 굴복해 버린 존재로 그려지지 않는다."},
{f:0,q:"'제설차 한 대 올 리 없는 깊은 백색의 골짜기'는 외부의 도움이 닿을 수 없는 철저한 고립과 단절을 드러낸다.",a:"O",e:"외부의 도움이 닿을 수 없는 극한의 고립 상황을 시각적으로 드러낸다. 벗어날 길 없는 가혹한 현실을 부각한다."},
{f:0,q:"이 시에서 '눈보라'는 자연의 섭리로 받아들여야 하는 시련을 상징한다.",a:"X",e:"'백색의 계엄령', '군단' 등의 표현에서 보듯 눈보라는 단순한 자연 현상이 아니라 가혹하고 폭력적인 억압 세력을 상징한다."},
{f:1,q:"'쪼그마한 숯덩이만한 게 짧은 날개를 파닥이며……'를 반복·변주하여 위협의 지속성을 강조한다.",a:"O",e:"유사한 시구를 반복·변주하는 것은 가혹한 상황이 지속됨을 강조하고 위태로운 작은 생명에 독자의 시선을 집중시키는 효과를 준다."},
{f:1,q:"'다투어 몰려오는 힘찬 눈보라의 군단'은 위협이 조직적이고 거세게 닥쳐옴을 역동적인 이미지와 함께 드러낸다.",a:"O",e:"'군단'이라는 군사 용어와 '다투어 몰려오는'이라는 역동적 표현이 결합해 조직적이고 거센 위협의 모습을 강렬하게 드러낸다."},
{f:1,q:"이 시는 서로 다른 빛깔을 맞세워 겨울이 깊어지며 계절이 바뀌어 가는 흐름을 선명하게 드러낸다.",a:"X",e:"이 시는 '백색'이라는 단일한 색채로 눈보라의 위압을 그릴 뿐 서로 다른 빛깔을 맞세우거나 계절 변화를 드러내지 않는다."},
{f:2,q:"이 시의 '눈보라'가 폭력적인 억압 세력을 상징한다면 '굴뚝새'는 그 속에서 살아남으려는 연약한 생명체를 상징한다.",a:"O",e:"'백색의 계엄령', '군단' 등으로 표현된 눈보라는 억압적 힘을, 뒷간에 몸을 감추며 버티는 굴뚝새는 연약한 생명을 상징한다."},
{f:2,q:"'솔개'에 대한 염려는 위협이 한 곳에만 그치지 않고 곳곳에 도사리고 있음을 암시한다.",a:"O",e:"'부리부리한 솔개'에 대한 언급은 눈보라 외에도 또 다른 위협이 곳곳에 숨어 있음을 암시하여 위협의 편재성을 강조한다."},
{f:2,q:"'해일처럼 굽이치는 백색의 산들'은 위협에 맞서 약자를 감싸 안으려는 자연의 손길을 나타낸다.",a:"X",e:"온 천지를 뒤덮는 눈보라의 압도적 위력을 형상화한 것이다. 약자를 보호하는 자연의 손길이 아니다."}
]},
{t:"벼 (이성부)",f:["시어·상징의 의미","표현 방식·기법","주제와 작품 이해"],q:[
{f:0,q:"'햇살 따가워질수록'에서 '햇살'은 민중에게 닥치는 시련과 고난을 상징한다.",a:"O",e:"'햇살 따가워질수록 깊이 익어'라는 구절에서 '햇살'은 어려울수록 더 여무는 벼의 속성을 통해 민중이 겪는 시련과 고난을 의미한다."},
{f:0,q:"'죄도 없이 죄지어서'는 민중이 실제로 큰 잘못을 저질렀음을 솔직히 인정한 표현이다.",a:"X",e:"이는 역설(모순어법)이다. 죄 없는데도 죄인처럼 고개 숙인 벼처럼 억울하게 억눌리고 고통받은 민중의 현실을 역설적으로 표현한 것이다."},
{f:0,q:"'벼는 소리 없이 떠나간다'는 민중이 저항을 포기하고 이상향으로 도피하는 모습을 상징한다.",a:"X",e:"다 익은 벼가 수확될 때 조용히 떠나는 모습으로 승리의 순간에 도취하지 않고 더 큰 뜻을 위해 자신을 내려놓는 희생을 나타낸다."},
{f:1,q:"이 시는 '벼'를 사람처럼 표현하는 의인화 기법을 사용하여 민중의 속성을 그려낸다.",a:"O",e:"'서로 어우러져 기대고 산다', '스스로를 아끼고 이웃들에게 저를 맡긴다' 등 벼를 사람처럼 표현하는 의인화 기법을 통해 민중의 공동체 의식과 연대를 형상화한다."},
{f:1,q:"'보아라'를 반복하여 독자의 주의를 끌고 대상에 집중하게 만드는 효과를 얻는다.",a:"O",e:"'더 튼튼해진 백성들을 보아라', '불타는 마음들을 보아라'에서 명령형 '보아라'의 반복이 독자의 주의를 끌고 민중의 모습에 시선을 모으게 한다."},
{f:1,q:"이 시는 '넉넉한 힘……'처럼 명사로 끝맺어 여운을 남기는 표현법을 사용한다.",a:"O",e:"마지막 연이 '이 넉넉한 힘……'이라는 명사(구)로 끝맺음으로써 독자에게 깊은 여운을 주는 명사 종결 방식을 사용한다."},
{f:2,q:"이 시는 자연물인 벼의 생태적 속성에 빗대어 민중의 공동체 의식과 강인한 생명력을 예찬한다.",a:"O",e:"낱낱으로 약하지만 서로 묶여 강해지는 벼의 속성을 통해 시련 속에서도 연대하며 맞서는 민중의 끈질긴 생명력과 공동체 의식을 예찬한다."},
{f:2,q:"'서러운 눈 씻어 맑게 다스릴 줄 안다'는 억압에 대한 폭력적 복수심과 적개심을 표현한 것이다.",a:"X",e:"서러움을 흘려보내고 마음을 맑게 가다듬는 성숙함과 내면의 절제력을 나타낸다. 폭력적 적개심이 아니다."},
{f:2,q:"이 시에서 '벼'는 고뇌하는 당대 지식인 계층의 모습을 상징한다.",a:"X",e:"'더 튼튼해진 백성들'에서 명시적으로 '벼 = 백성(민중)'임을 드러낸다. 지식인 계층이 아니라 억압받으면서도 연대하는 민중을 상징한다."},
{f:0,q:"'스스로를 아끼고 이웃들에게 저를 맡긴다'는 타인에게 책임을 전가하는 개인주의적 태도를 나타낸다.",a:"X",e:"속이 여물어 자신을 낮추면서도 이웃에게 자신을 내어주는 연대와 나눔의 태도를 나타낸다. 개인주의가 아니라 상호 의존적 공동체 정신이다."}
]},
{t:"직녀에게 (문병란)",f:["시어·구절의 의미","표현 방식·기법","화자의 태도와 주제"],q:[
{f:0,q:"이 시에서 '은하수'는 두 사람의 만남을 가로막는 장애물이자 시련을 상징한다.",a:"O",e:"견우와 직녀 설화에서 두 사람을 가로막는 은하수는 이 시에서 분단 현실처럼 만남을 가로막는 장벽과 시련을 상징한다."},
{f:0,q:"'오작교마저 끊어져 버린'은 원래 설화보다 더 가혹한 현실을 강조하는 표현이다.",a:"O",e:"설화에서는 칠월칠석에 만나는 다리가 있지만 이 시에서는 그것조차 없어 더 가혹한 분단 현실을 강조한다."},
{f:0,q:"'그대 손짓하는 연인아'는 화자가 고통에서 구원받을 것임을 알려주는 표현이다.",a:"X",e:"직녀가 도움을 청하는 손짓일 뿐 화자가 구원받는다는 뜻이 아니다. 화자(견우)는 스스로 건너가야 한다는 의지를 갖고 있다."},

{t:"우리가 물이 되어 (강은교)",f:["시어·상징의 의미","표현 방식·기법","화자의 태도와 주제"],q:[
{f:0,q:"이 시에서 '물'은 생명력과 정화, 어우러짐을 잇는 긍정적 이미지의 매개이다.",a:"O",e:"'가문 어느 집'(메마른 현실)을 적셔주는 '물'은 생명력과 정화, 너와 내가 하나로 어우러지는 매개 역할을 하는 긍정적 이미지다."},
{f:0,q:"'가문 어느 집'은 화자가 돌아가고 싶은 이상적 공간이다.",a:"X",e:"'가문 어느 집'은 이상향이 아니라 생명력을 잃은 메마르고 삭막한 현대 사회를 빗댄 말이다."},
{f:0,q:"3연의 '불'은 진정한 만남을 위해 반드시 거쳐야 할 정화의 과정으로도 읽힌다.",a:"O",e:"'불'은 부정적인 것을 소멸하는 이미지지만 '숯이 된 뼈 하나가 불타는 것들을 쓰다듬는' 데서 보듯 진정한 만남 전에 거쳐야 할 정화 과정이기도 하다."},

{f:1,q:"'~만난다면, ~흐른다면' 등 가정법을 반복하여 소망을 구체화한다.",a:"O",e:"'우리가 물이 되어 만난다면', '우르르 우르르 비 오는 소리로 흐른다면' 등 가정법의 반복이 간절한 소망을 구체적으로 드러낸다."},
{f:1,q:"'우르르 우르르', '푸시시 푸시시' 같은 음성 상징어를 사용하여 생동감과 감각적 효과를 준다.",a:"O",e:"'우르르 우르르'는 물의 생명력과 역동성을, '푸시시 푸시시'는 불이 꺼지는 소리 갈등이 끝나는 소리를 감각적으로 표현한다."},

{f:2,q:"'만 리 밖에서 기다리는 그대'는 이상 세계에 끝내 닿을 수 없다는 인간의 한계를 뜻한다.",a:"X",e:"만남에 '시간이 오래 걸린다'는 거리감일 뿐 도달 불가능을 말하는 것이 아니다."},

]},
{t:"타는 목마름으로 (김지하)",f:["시어·구절의 의미","표현 방식·기법","화자의 태도와 주제"],q:[
{f:0,q:"'신새벽 뒷골목'은 억압이 극에 달한 현실을 상징하는 동시에, '새벽'이라는 시어로 곧 올 밝은 미래를 암시하기도 한다.",a:"O",e:"동트기 직전 가장 어두운 시간(신새벽)과 감시를 피하는 은밀한 공간(뒷골목)은 억압적 현실을 나타내지만 '새벽'에는 곧 올 밝은 미래의 희망도 암시되어 있다."},
{f:0,q:"'내 머리는 너를 잊은 지 오래'는 화자가 민주주의에 대한 저항을 포기하고 현실에 순응함을 나타낸다.",a:"X",e:"탄압이 너무 심했음을 강조하는 반어적 표현이다. 실제로 잊은 것이 아니라 '타는 가슴 속 목마름의 기억'이 여전히 남아 있음을 역설적으로 드러낸다."},
{f:0,q:"'외로운 눈부심'은 어둠 속에서도 빛나는 민주주의의 가치를 드러내는 역설적 표현이다.",a:"O",e:"어둠(억압) 속에서도 빛나는(눈부심) 민주주의의 소중한 가치를 담은 역설(모순형용)이다."},
{f:0,q:"'발자욱 소리 호루락소리 문 두드리는 소리'와 '비명소리 신음소리 통곡소리'를 내는 주체는 서로 같다.",a:"X",e:"앞의 소리들은 탄압하는 쪽(공권력)이, 뒤의 소리들은 탄압받는 민중이 내는 것이다. 주체가 서로 다르다."},
{f:1,q:"'민주주의'를 '너'로 의인화하고 직접 불러(호명) 간절함을 더한다.",a:"O",e:"민주주의를 '너'로 의인화하여 직접 부름으로써 그리움과 열망이 구체화되고 간절함이 더욱 강조된다."},
{f:1,q:"'떨리는 손 / 떨리는 가슴 / 치떨리는 노여움으로'는 반복·점층으로 두려움과 분노 속에서도 끝내 쓰겠다는 비장한 의지를 드러낸다.",a:"O",e:"'떨리는'의 반복과 '치떨리는'으로의 점층은 두려움과 분노가 고조되는 가운데에서도 민주주의를 쓰겠다는 비장한 의지를 강조한다."},
{f:1,q:"'타는 목마름으로'를 반복하여 핵심 시어를 강조하고 민주주의를 향한 간절함을 극대화한다.",a:"O",e:"3연에서 '타는 목마름으로 / 타는 목마름으로'를 반복함으로써 민주주의를 향한 갈망과 간절함이 극에 달하는 효과를 만들어낸다."},
{f:2,q:"이 시는 1970년대 유신 독재의 억압 속에서 민주주의에 대한 간절한 열망과 저항 의지를 표현한 참여시이다.",a:"O",e:"'남몰래', '뒷골목', '끌려가던 벗들' 등에서 드러나듯 유신 독재의 억압 속에서 민주주의를 갈망하고 저항하는 참여시의 대표작이다."},
{f:2,q:"이 시는 암울한 현실 속에서 희망을 잃고 좌절하는 태도가 주를 이룬다.",a:"X",e:"좌절이 아니라 강한 비판과 열망, 저항 의지가 핵심이다. '민주주의여 만세'라는 절규에서 보듯 부정적 현실에도 굽히지 않는 의지가 시 전체를 이끌어간다."},
{f:2,q:"'서툰 솜씨로 쓴다'는 민주주의를 오랫동안 빼앗겨 온 현실을 드러내는 표현이다.",a:"O",e:"민주주의를 빼앗긴 지 오래여서 그 이름조차 쓰기가 서툴 수밖에 없다는 표현으로 억압의 기간과 깊이를 나타낸다."}
]},
{t:"일야구도하기 (박지원)",f:["글쓴이의 인식과 견해","서술 방식·표현 기법","작품의 주제"],q:[
{f:0,q:"글쓴이는 강물 소리는 듣는 사람의 마음 상태에 따라 다르게 들린다고 본다.",a:"O",e:"'강물 소리란 듣는 사람이 어떻게 듣느냐에 달려 있을 뿐이다'라고 직접 밝히고 있다."},
{f:0,q:"글쓴이는 마음을 차분히 가라앉히고 귀를 기울이면 물소리의 참된 실체를 객관적으로 파악할 수 있다고 본다.",a:"X",e:"글쓴이는 귀·눈이라는 감각에 의존하면 선입견에 갇히므로 마음을 근본으로 삼아야 한다고 본다. 감각으로 '바른 소리'를 객관적으로 파악할 수 있다는 진술은 견해와 어긋난다."},
{f:0,q:"낮에 요동 벌판의 강물 소리가 들리지 않는 것은 눈으로 위험을 보느라 시각에 감각이 집중되었기 때문이다.",a:"O",e:"'낮에는 눈으로 물을 볼 수 있으므로 눈은 오직 위험한 데만 쏠려 어찌 귀에 소리가 들리겠는가?'라고 밝히고 있다."},
{f:0,q:"우임금 고사는 강물을 건너는 방법이 시대에 따라 변화해온 역사적 근거를 제시한다.",a:"X",e:"우임금 고사는 죽고 사는 마음의 중심이 확고하면 외부 위험(외물)에 감각이 흔들리지 않음을 보여주는 예시다."},
{f:1,q:"이 글은 강을 건너는 구체적·일상적 경험을 바탕으로 삶의 본질에 대한 철학적 사유를 이끌어낸다.",a:"O",e:"강을 건너는 구체적 체험을 바탕으로 외물(감각)에 현혹되지 말아야 한다는 삶의 본질적·철학적 깨달음을 이끌어낸다."},
{f:1,q:"이 글은 요동 벌판에서 강물 소리가 나지 않는다는 통념을 입증하는 방향으로 서술된다.",a:"X",e:"글쓴이는 그 통념을 반박한다. '이는 물을 몰라서 하는 말이다'라며 밤에 건너지 않아서 소리가 들리지 않는 것이라고 논박한다."},
{f:1,q:"'강물을 땅으로 생각하고, 강물을 옷이라 생각하며 …'는 두려운 대상을 마음으로 끌어안아 그 위협을 무화하려는 태도이다.",a:"O",e:"두려운 대상(강물)을 일상적인 것들로 여김으로써 마음으로 받아들여 위협을 무화한다. 외면이나 회피가 아니라 마음으로 끌어안는 태도다."},
{f:2,q:"이 글의 핵심 주제는 선입견 없는 마음이야말로 외물(감각)에 흔들리지 않는 근본이라는 것이다.",a:"O",e:"'마음에 선입견을 가지지 않는 사람은 귀와 눈이 탈이 되지 않는다'는 구절에서 선입견 없는 마음이 외물에 흔들리지 않는 근본임을 직접 밝히고 있다."},
{f:2,q:"글쓴이가 최종적으로 경계하는 것은 '자기만 유익하게 하는 처신에 밝고 자신의 총명만을 믿는' 태도이다.",a:"O",e:"글의 마지막에서 '자기만 유익하게 하는 처신에 밝고 자신의 총명만을 믿는 사람에게 이를 가지고 경고하노라'라며 그 태도를 경계하고 있다."},
{f:2,q:"이 글에서 우임금 고사는 자연의 위력 앞에 무기력한 인간의 숙명적 한계를 상징적으로 드러낸다.",a:"X",e:"우임금은 황룡의 위험에도 마음의 판단이 분명하자 두려움 없이 건넜다. 무기력한 한계가 아니라 마음의 힘이 외물의 위협을 극복하는 사례를 보여준다."}
]},

let cW=0,cTab='q',ans={},chk={};
function k(w,q){return w+'_'+q;}
function tAns(){return Object.keys(ans).length;}
function tOk(){return Object.keys(ans).filter(k2=>{const[w,q]=k2.split('_');return ans[k2]===D[w].q[q].a;}).length;}
function upd(){const a=tAns(),o=tOk();document.getElementById('st-a').textContent=a;document.getElementById('st-o').textContent=a>0?o+'/'+a:'-';}
function rnav(){
  document.getElementById('wnav').innerHTML=D.map((w,i)=>{
    let c='w-btn';if(i===cW)c+=' active';else if(chk[i])c+=' done';
    return `<button class="${c}" onclick="sw(${i})">${i+1}. ${w.t.replace(/\s*\(.*\)/,'')}</button>`;
  }).join('');
}
function sw(i){cW=i;rnav();showTab(cTab);}
function showTab(t){
  cTab=t;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===['q','a','s'].indexOf(t)));
  ['q-area','a-area','s-area'].forEach((id,i)=>document.getElementById(id).style.display=i===['q','a','s'].indexOf(t)?'block':'none');
  if(t==='q')rq();else if(t==='a')ra();else rs();
}
function sa(wi,qi,v){if(chk[wi])return;ans[k(wi,qi)]=v;upd();rq();}
function rq(){
  const w=D[cW],done=chk[cW];
  let ac=w.q.filter((_,qi)=>ans[k(cW,qi)]!==undefined).length;
  let oc=done?w.q.filter((q,qi)=>ans[k(cW,qi)]===q.a).length:0;
  let h='<div class="progress">';
  w.q.forEach((_,qi)=>{const v=ans[k(cW,qi)];let c='dot';if(done&&v)c+=v===w.q[qi].a?' ok':' ng';else if(v)c+=' ans';h+=`<div class="${c}"></div>`;});
  h+='</div>';
  if(done){const msg=oc===10?'완벽합니다!':oc>=8?'훌륭해요!':oc>=6?'조금 더 공부해봐요.':'다시 도전해보세요!';h+=`<div class="score-box"><div class="score-big">${oc}/10</div><div class="score-sub">${msg}</div></div>`;}
  w.q.forEach((q,qi)=>{
    const v=ans[k(cW,qi)];let oc2='ox-btn',xc='ox-btn',res='';
    if(done&&v){if(v==='O')oc2+=q.a==='O'?' right':' wrong';if(v==='X')xc+=q.a==='X'?' right':' wrong';const ok=v===q.a;res=`<div class="result show ${ok?'ok':'fail'}">${ok?'✓ 정답':'✗ 오답'} — 정답: <strong>${q.a}</strong><br><span style="font-size:12px;opacity:.85">${q.e}</span></div>`;}
    else if(v){if(v==='O')oc2+=' sel-o';if(v==='X')xc+=' sel-x';}
    h+=`<div class="q-card"><div class="q-top"><div class="q-num">${qi+1}</div><div style="flex:1"><span class="factor-tag">${w.f[q.f]}</span><div class="q-text">${q.q}</div></div></div><div class="ox-row"><button class="${oc2}" onclick="sa(${cW},${qi},'O')">O</button><button class="${xc}" onclick="sa(${cW},${qi},'X')">X</button></div>${res}</div>`;
  });
  if(!done)h+=`<button class="check-btn" onclick="ck()">채점하기 (${ac}/10)</button>`;
  else h+=`<button class="reset-btn" onclick="rst()">↺ 이 작품 다시 풀기</button>`;
  document.getElementById('q-area').innerHTML=h;
}
function ck(){chk[cW]=true;rnav();rq();upd();}
function rst(){D[cW].q.forEach((_,qi)=>delete ans[k(cW,qi)]);delete chk[cW];rnav();rq();upd();}
function ra(){
  const w=D[cW];
  let h=`<div class="work-hdr">${w.t}</div><div class="ans-sum">`;
  w.q.forEach((q,qi)=>{h+=`<span class="ans-pill ${q.a.toLowerCase()}">${qi+1}. ${q.a}</span>`;});
  h+='</div>';
  w.q.forEach((q,qi)=>{h+=`<div class="ans-card"><div class="ans-q-row"><span class="ans-badge ans-pill ${q.a.toLowerCase()}">${qi+1} ${q.a}</span><span style="font-size:13px;color:#555;line-height:1.6">${q.q}</span></div><div class="ans-e-row">${q.e}</div></div>`;});
  document.getElementById('a-area').innerHTML=h;
}
